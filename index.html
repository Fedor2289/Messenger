<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0e1621;--bg1:#17212b;--bg2:#242f3d;--bg3:#2b3a4a;
  --active:#2b5278;--accent:#5288c1;--accent2:#3d6fa8;
  --bbl-in:#182533;--bbl-out:#2b5278;
  --t1:#e8eaed;--t2:#8a9bac;--t3:#5d7a96;
  --border:#1f2d3a;--green:#4dcd5e;--red:#e74c3c;
  --shadow:0 8px 32px rgba(0,0,0,.5);--r:12px;--rs:8px;--tr:.17s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg0);color:var(--t1);
  overflow:hidden;font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.hidden{display:none!important}

/* ── АВАТАР ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:600;color:#fff;flex-shrink:0;position:relative;text-transform:uppercase;user-select:none}
.av46{width:46px;height:46px;font-size:17px}.av40{width:40px;height:40px;font-size:15px}
.av32{width:32px;height:32px;font-size:11px}.av56{width:56px;height:56px;font-size:20px}
.av-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;
  background:var(--green);border:2px solid var(--bg1);border-radius:50%}

/* ── КНОПКИ ── */
.ib{width:36px;height:36px;border:none;background:none;color:var(--t2);border-radius:50%;
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:all var(--tr);flex-shrink:0}
.ib:hover{background:var(--bg3);color:var(--t1)}.ib:active{transform:scale(.92)}
.btn{padding:11px 20px;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;
  cursor:pointer;transition:all var(--tr);font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(82,136,193,.4)}
.btn-primary:active{transform:none}
.btn-danger{background:rgba(231,76,60,.18);color:#ff6b6b;border:1px solid rgba(231,76,60,.3)}
.btn-danger:hover{background:rgba(231,76,60,.28)}
.btn-full{width:100%}

/* ── ФОРМЫ ── */
.fg{margin-bottom:14px}
.flb{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.6px}
.fi{width:100%;padding:11px 14px;background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--rs);color:var(--t1);font-size:14px;font-family:inherit;
  outline:none;transition:border-color var(--tr)}
.fi:focus{border-color:var(--accent)}.fi::placeholder{color:var(--t3)}
textarea.fi{resize:none}

/* ── AUTH ── */
#auth{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:var(--bg0);z-index:200}
.acard{background:var(--bg1);border:1px solid var(--border);border-radius:20px;padding:38px;
  width:100%;max-width:380px;box-shadow:var(--shadow);animation:popIn .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
.alogo{text-align:center;margin-bottom:28px}
.alogo-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:20px;display:inline-flex;align-items:center;justify-content:center;
  font-size:30px;margin-bottom:12px;box-shadow:0 8px 24px rgba(82,136,193,.3)}
.alogo h1{font-size:22px;font-weight:600}.alogo p{font-size:13px;color:var(--t2);margin-top:3px}
.atabs{display:flex;background:var(--bg2);border-radius:var(--rs);padding:3px;gap:2px;margin-bottom:22px}
.atab{flex:1;padding:9px;border:none;background:none;color:var(--t2);font-size:13px;
  font-weight:500;border-radius:6px;cursor:pointer;transition:all var(--tr);font-family:inherit}
.atab.on{background:var(--accent);color:#fff}
.aerr{background:rgba(231,76,60,.12);border:1px solid rgba(231,76,60,.3);border-radius:var(--rs);
  padding:10px 14px;color:#ff6b6b;font-size:13px;margin-top:10px}

/* ── LAYOUT ── */
#app{display:none;height:100vh;overflow:hidden}
.layout{display:flex;height:100vh}

/* ── САЙДБАР ── */
.sb{width:320px;min-width:320px;background:var(--bg1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;flex-shrink:0;transition:transform .3s ease}
.sbh{padding:0 14px;height:60px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-shrink:0}
.sbh-title{flex:1;font-size:18px;font-weight:600}
.srch{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.srch-in{position:relative}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:14px;pointer-events:none}
.srch-input{width:100%;padding:9px 12px 9px 34px;background:var(--bg2);border:none;
  border-radius:20px;color:var(--t1);font-size:13.5px;font-family:inherit;outline:none}
.srch-input::placeholder{color:var(--t3)}
.chatlist{flex:1;overflow-y:auto}
.no-chats{text-align:center;padding:40px 16px;color:var(--t3);font-size:13px}
.no-chats .ico{font-size:40px;margin-bottom:12px}
.ci{display:flex;align-items:center;padding:10px 14px;gap:12px;cursor:pointer;transition:background var(--tr)}
.ci:hover{background:var(--bg3)}.ci.active{background:var(--active)}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-prev{font-size:12.5px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ci.active .ci-prev{color:rgba(255,255,255,.55)}.ci.active .av-dot{border-color:var(--active)}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.ci-time{font-size:11px;color:var(--t3)}.ci.active .ci-time{color:rgba(255,255,255,.45)}
.badge{background:var(--accent);color:#fff;font-size:11px;font-weight:600;
  padding:2px 6px;border-radius:10px;min-width:20px;text-align:center}
.sbfoot{border-top:1px solid var(--border);padding:10px 14px;
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.my-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.my-status::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%}
.conn-bad{font-size:11px;padding:3px 8px;border-radius:10px;
  background:rgba(231,76,60,.15);color:#ff6b6b;display:none;align-items:center;gap:4px}
.conn-bad.show{display:flex}.conn-bad::before{content:'';width:6px;height:6px;background:#ff6b6b;border-radius:50%}

/* ── ЧАТ ── */
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg0);min-width:0}
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--t3)}
.welcome .ico{font-size:64px;opacity:.3}
.welcome h3{font-size:20px;font-weight:500;color:var(--t2)}
.chd{padding:0 14px;height:60px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;background:var(--bg1);flex-shrink:0}
.chd-info{flex:1;min-width:0}
.chd-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chd-sub{font-size:12px;color:var(--t3);margin-top:1px}
.chd-sub.online{color:var(--green)}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px}
.load-more{align-self:center;padding:6px 18px;background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;color:var(--t2);font-size:13px;cursor:pointer;font-family:inherit;
  transition:all var(--tr);margin-bottom:8px}
.load-more:hover{background:var(--bg3);color:var(--t1)}
.date-sep{text-align:center;margin:10px 0}
.date-sep span{background:rgba(82,136,193,.14);color:var(--t2);font-size:11.5px;
  font-weight:500;padding:4px 12px;border-radius:10px}

/* ── СООБЩЕНИЕ ── */
.mw{display:flex;align-items:flex-end;gap:6px;position:relative}
.mw.out{flex-direction:row-reverse}.mw.consec .mav{visibility:hidden}
.mav{flex-shrink:0;cursor:pointer}
.bbl{max-width:66%;padding:8px 12px;border-radius:16px;line-height:1.5;
  animation:msgPop .2s cubic-bezier(.34,1.56,.64,1);position:relative}
@keyframes msgPop{from{opacity:0;transform:translateY(5px) scale(.97)}to{opacity:1;transform:none}}
.mw:not(.out) .bbl{background:var(--bbl-in);border-bottom-left-radius:4px}
.mw.out .bbl{background:var(--bbl-out);border-bottom-right-radius:4px}
.mw.first .bbl{border-top-left-radius:16px}
.sndr{font-size:12px;font-weight:600;margin-bottom:3px}
.txt{font-size:14px;word-break:break-word;white-space:pre-wrap}
.mmeta{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:4px}
.mtime{font-size:11px;color:rgba(255,255,255,.4)}
.tick{font-size:12px;color:rgba(255,255,255,.35)}.tick.read{color:#5dcfff}

/* ── РЕАКЦИИ ── */
.rxns{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.rxn-pill{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:2px 7px;
  font-size:13px;cursor:pointer;transition:all var(--tr);user-select:none}
.rxn-pill:hover{background:rgba(255,255,255,.15)}
.rxn-pill.mine{background:rgba(82,136,193,.35);border-color:rgba(82,136,193,.5)}
.rxn-cnt{font-size:11px;color:var(--t2)}
.react-btn{position:absolute;background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;padding:2px 6px;font-size:16px;cursor:pointer;display:none;
  top:-18px;z-index:5;transition:all var(--tr);white-space:nowrap}
.mw:hover .react-btn{display:flex;gap:2px}
.mw:not(.out) .react-btn{right:0}.mw.out .react-btn{left:0}
.react-btn span{cursor:pointer;transition:transform .1s}
.react-btn span:hover{transform:scale(1.3)}

/* ── МЕДИА СООБЩЕНИЯ ── */
.msg-img{max-width:280px;max-height:300px;border-radius:10px;cursor:pointer;
  display:block;object-fit:cover;margin:2px 0}
.msg-gif{max-width:280px;border-radius:10px;cursor:pointer;display:block}
.msg-file{display:flex;align-items:center;gap:10px;padding:4px 0}
.msg-file-ico{font-size:28px;flex-shrink:0}
.msg-file-info{flex:1;min-width:0}
.msg-file-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msg-file-size{font-size:11px;color:rgba(255,255,255,.5)}
.msg-file-dl{font-size:12px;color:#5dcfff;cursor:pointer;text-decoration:underline}
.sticker{font-size:52px;line-height:1.2;cursor:default;padding:2px 4px}

/* ── ГОЛОСОВОЕ СООБЩЕНИЕ ── */
.voice-player{display:flex;align-items:center;gap:10px;min-width:200px;padding:2px 0}
.vp-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;transition:background var(--tr)}
.vp-btn:hover{background:rgba(255,255,255,.25)}
.vp-track{flex:1;display:flex;flex-direction:column;gap:4px}
.vp-bar{width:100%;height:3px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer;position:relative}
.vp-prog{height:100%;background:rgba(255,255,255,.7);border-radius:2px;width:0%;transition:width .1s}
.vp-times{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.45)}
.vp-waves{display:flex;align-items:center;gap:2px;height:20px}
.vp-wave{width:3px;border-radius:2px;background:rgba(255,255,255,.3);flex-shrink:0}

/* ── TYPING ── */
.typing-bar{height:26px;padding:0 16px;display:none;align-items:center;gap:8px;
  font-size:12.5px;color:var(--t2);font-style:italic;flex-shrink:0}
.tdots{display:flex;gap:3px}
.tdots span{width:5px;height:5px;background:var(--t2);border-radius:50%;animation:tdot 1.2s infinite}
.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:1}}

/* ── ПОЛЕ ВВОДА ── */
.iarea{padding:10px 12px;border-top:1px solid var(--border);background:var(--bg1);
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.iwrap{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:22px;
  padding:9px 12px;display:flex;align-items:flex-end;gap:6px;transition:border-color var(--tr)}
.iwrap:focus-within{border-color:var(--accent)}
.ita{flex:1;background:none;border:none;outline:none;resize:none;color:var(--t1);
  font-size:14px;font-family:inherit;line-height:1.5;max-height:120px;min-height:22px;overflow-y:auto}
.ita::placeholder{color:var(--t3)}
.char-cnt{font-size:11px;color:var(--t3);flex-shrink:0;align-self:flex-end;padding-bottom:1px}
.sbtn{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;transition:all var(--tr);
  box-shadow:0 2px 12px rgba(82,136,193,.4)}
.sbtn:hover{transform:scale(1.07)}.sbtn:active{transform:scale(.94)}

/* Панель вложений */
.attach-menu{position:absolute;bottom:72px;left:14px;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);
  overflow:hidden;z-index:20;animation:popIn .15s ease;min-width:180px}
.am-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;
  transition:background var(--tr);font-size:13.5px}
.am-item:hover{background:var(--bg3)}.am-item .ico{font-size:20px;width:24px;text-align:center}

/* Стикеры */
.sticker-panel{position:absolute;bottom:72px;left:14px;background:var(--bg2);
  border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);
  padding:14px;z-index:20;animation:popIn .15s ease;width:300px}
.sp-title{font-size:12px;color:var(--t2);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sp-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.sp-item{font-size:28px;text-align:center;cursor:pointer;padding:6px;border-radius:8px;
  transition:all var(--tr);line-height:1.2}
.sp-item:hover{background:var(--bg3);transform:scale(1.2)}

/* Запись голоса */
.voice-rec{display:flex;align-items:center;gap:10px;padding:8px 14px;
  background:rgba(231,76,60,.1);border-top:1px solid rgba(231,76,60,.2);
  border-radius:0 0 var(--r) var(--r);flex-shrink:0}
.rec-dot{width:10px;height:10px;background:var(--red);border-radius:50%;
  animation:pulse 1s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rec-time{font-size:14px;font-weight:600;color:var(--red);font-variant-numeric:tabular-nums}
.rec-waves{display:flex;align-items:center;gap:2px;flex:1;height:24px}
.rec-wave{width:3px;border-radius:2px;background:rgba(231,76,60,.6)}

/* ── МОДАЛКИ ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(4px);
  z-index:50;display:none;align-items:center;justify-content:center}
.overlay.show{display:flex;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg1);border:1px solid var(--border);border-radius:20px;
  width:100%;max-width:420px;margin:16px;box-shadow:var(--shadow);
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
.mhd{padding:18px 22px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mtitle{font-size:15px;font-weight:600}
.mbody{padding:16px 22px 22px;overflow-y:auto}
.mtabs{display:flex;background:var(--bg2);border-radius:var(--rs);padding:3px;gap:2px;margin-bottom:16px}
.mtab{flex:1;padding:8px;border:none;background:none;color:var(--t2);font-size:13px;
  font-weight:500;border-radius:6px;cursor:pointer;transition:all var(--tr);font-family:inherit}
.mtab.on{background:var(--accent);color:#fff}
.ulist{display:flex;flex-direction:column;gap:2px;max-height:260px;overflow-y:auto;margin-top:12px}
.urow{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:var(--rs);
  cursor:pointer;transition:background var(--tr)}
.urow:hover{background:var(--bg3)}.urow.sel{background:rgba(82,136,193,.22)}
.uri{flex:1;min-width:0}
.urn{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ust{font-size:12px;color:var(--t3)}.ust.on{color:var(--green)}
.uchk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.urow.sel .uchk{background:var(--accent);border-color:var(--accent);color:#fff;font-size:11px}
.sel-cnt{font-size:13px;color:var(--accent);margin-top:10px;min-height:18px}

/* Профиль */
.prof-av{display:flex;justify-content:center;margin-bottom:20px;position:relative}
.prof-av .av56{cursor:pointer;transition:all var(--tr)}
.prof-av .av56:hover{opacity:.8}
.color-picker{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.cp-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:all var(--tr);border:2px solid transparent}
.cp-dot:hover{transform:scale(1.15)}.cp-dot.sel{border-color:#fff;transform:scale(1.1)}

/* ── LIGHTBOX ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;
  display:none;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:var(--rs)}
.lightbox .close-lb{position:fixed;top:20px;right:24px;font-size:28px;color:#fff;
  cursor:pointer;background:none;border:none;opacity:.7}
.lightbox .close-lb:hover{opacity:1}

/* ── TOAST ── */
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 16px;font-size:13px;color:var(--t1);box-shadow:var(--shadow);
  animation:msgPop .22s ease;white-space:nowrap}
.toast.err{border-color:rgba(231,76,60,.4);background:rgba(231,76,60,.15);color:#ff6b6b}
.toast.ok{border-color:rgba(77,205,94,.4);background:rgba(77,205,94,.1);color:#4dcd5e}
.spinner{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.15);
  border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── МОБАЙЛ ── */
@media(max-width:768px){
  .sb{position:fixed;left:0;top:0;bottom:0;z-index:20;width:100%!important;min-width:unset}
  .sb.slid{transform:translateX(-100%)}
  .chat-area{position:fixed;inset:0;display:none}
  .chat-area.vis{display:flex}
  .welcome{display:none}.back-btn{display:flex!important}
  .attach-menu,.sticker-panel{left:8px;right:8px;width:auto}
  .iarea{position:relative}
}
.back-btn{display:none}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="acard">
    <div class="alogo">
      <div class="alogo-icon">💬</div>
      <h1>Messenger</h1><p>Мгновенные сообщения</p>

<script>
'use strict';

/* ════ СОСТОЯНИЕ ════════════════════════════════ */
const S = {
  token: localStorage.getItem('token'), me: null,
  rooms: [], roomId: null,
  ws: null, wsDelay: 1000, wsAuthFail: false, pingInt: null,
  hasMore: false, loadingMore: false,
  tyTimers: {}, tyTO: null, wasTyping: false,
  allUsers: [], grpSel: new Set(),
  ncTab: 'direct',
  // Запись голоса
  mediaRec: null, recStream: null, recChunks: [], recTimer: null, recSec: 0,
  recWaveInt: null,
  // Attachment menu
  attachOpen: false, stickerOpen: false,
};

const API = location.origin;
const WS  = API.replace(/^http/, 'ws');

const COLORS = [
  "#E17055","#00B894","#0984E3","#6C5CE7",
  "#FDCB6E","#E84393","#00CEC9","#55EFC4",
  "#74B9FF","#A29BFE","#FD79A8","#FAB1A0",
  "#2ECC71","#E67E22","#9B59B6","#1ABC9C",
];

const STICKERS = [
  "😀","😂","🥹","😍","🥰","😎","🤩","😜","🤔","😴",
  "😭","😤","🤯","🥳","🤗","😈","💀","👻","🎉","🔥",
  "❤️","💔","👍","👎","✌️","🙌","💪","🫶","🤝","🫠",
  "🐶","🐱","🦊","🐸","🦋","🌈","⭐","🍕","🎮","💎",
];

const REACT_EMOJIS = ["👍","❤️","😂","😮","😢","🔥"];

/* ════ УТИЛИТЫ ══════════════════════════════════ */
async function http(method, path, body, params={}) {
  const url = new URL(API+path);
  if (S.token) url.searchParams.set('token', S.token);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const r = await fetch(url, {method,
    headers:{'Content-Type':'application/json'},
    body: body ? JSON.stringify(body) : undefined});
  if (!r.ok) { const e = await r.json().catch(()=>({detail:'Ошибка сервера'})); throw new Error(e.detail||'Ошибка'); }
  return r.json();
}

async function httpForm(path, formData) {
  const url = new URL(API+path);
  if (S.token) url.searchParams.set('token', S.token);
  const r = await fetch(url, {method:'POST', body: formData});
  if (!r.ok) { const e = await r.json().catch(()=>({detail:'Ошибка'})); throw new Error(e.detail||'Ошибка'); }
  return r.json();
}

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s||''));
  return d.innerHTML;
}

function fmtTime(iso) { return new Date(iso).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso) {
  const d=new Date(iso), t=new Date(), y=new Date(t);
  y.setDate(y.getDate()-1);
  if(d.toDateString()===t.toDateString()) return 'Сегодня';
  if(d.toDateString()===y.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru',{day:'numeric',month:'long'});
}
function fmtSize(b) {
  if(!b) return '';
  if(b<1024) return b+'Б';
  if(b<1048576) return (b/1024).toFixed(1)+'КБ';
  return (b/1048576).toFixed(1)+'МБ';
}
function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function toast(msg, type='') {
  const el=document.createElement('div');
  el.className='toast'+(type?' '+type:''); el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}

function initials(name) { return name?(name[0]).toUpperCase():'?'; }
function dispName(u) { return u.display_name || u.username; }

function avEl(u, sz='av32') {
  const dot = u.is_online ? '<div class="av-dot"></div>' : '';
  return `<div class="av ${sz}" style="background:${u.avatar_color}">${initials(dispName(u))}${dot}</div>`;
}

function closeOv(e,id) { if(e.target===document.getElementById(id)) closeM(id); }
function openM(id)  { document.getElementById(id).classList.add('show'); }
function closeM(id) { document.getElementById(id).classList.remove('show'); }

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    ['m-new','m-mbrs','m-prof'].forEach(closeM);
    closeLB();
    closeAttach();
  }
});

/* ════ АВТОРИЗАЦИЯ ══════════════════════════════ */
function swAuth(t) {
  document.getElementById('tab-login').classList.toggle('hidden', t!=='login');
  document.getElementById('tab-reg').classList.toggle('hidden', t!=='reg');
  document.querySelectorAll('.atab').forEach((el,i)=>
    el.classList.toggle('on',(i===0&&t==='login')||(i===1&&t==='reg')));
  document.getElementById('auth-err').classList.add('hidden');
}

function showAErr(m) {
  const el=document.getElementById('auth-err');
  el.textContent=m; el.classList.remove('hidden');
}

async function doLogin() {
  const username=document.getElementById('l-u').value.trim();
  const password=document.getElementById('l-p').value;
  if(!username||!password){showAErr('Заполните все поля');return;}
  try { const d=await http('POST','/api/login',{username,password}); setAuth(d); }
  catch(e){showAErr(e.message);}
}

async function doRegister() {
  const username=document.getElementById('r-u').value.trim();
  const email=document.getElementById('r-e').value.trim();
  const password=document.getElementById('r-p').value;
  if(!username||!email||!password){showAErr('Заполните все поля');return;}
  try { const d=await http('POST','/api/register',{username,email,password}); setAuth(d); }
  catch(e){showAErr(e.message);}
}

function setAuth(d) {
  S.token=d.access_token; S.me=d.user;
  localStorage.setItem('token',S.token);
  boot();
}

function logout() {
  localStorage.removeItem('token');
  if(S.ws){S.ws.onclose=null;S.ws.close();}
  S.token=null; S.me=null;
  document.getElementById('auth').style.display='flex';
  document.getElementById('app').style.display='none';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('auth').style.display!=='none'){
    if(!document.getElementById('tab-login').classList.contains('hidden')) doLogin();
    else doRegister();
  }
});

/* ════ ЗАПУСК ══════════════════════════════════ */
async function boot() {
  document.getElementById('auth').style.display='none';
  document.getElementById('app').style.display='block';
  updMyInfo();
  buildStickerPanel();
  await loadRooms();
  connectWS();
}

function updMyInfo() {
  const u=S.me;
  const el=document.getElementById('my-av');
  el.textContent=initials(dispName(u)); el.style.background=u.avatar_color;
  document.getElementById('my-name').textContent=dispName(u);
}

async function tryAuto() {
  if(!S.token) return;
  try { S.me=await http('GET','/api/me'); boot(); }
  catch{ localStorage.removeItem('token'); S.token=null; }
}
tryAuto();

/* ════ WEBSOCKET ════════════════════════════════ */
function connectWS() {
  if(S.ws){S.ws.onclose=null;S.ws.close();}
  clearInterval(S.pingInt);
  S.ws=new WebSocket(`${WS}/ws/${S.token}`);
  S.ws.onopen=()=>{
    S.wsDelay=1000; S.wsAuthFail=false;
    document.getElementById('conn-bad').classList.remove('show');
    S.pingInt=setInterval(()=>{
      if(S.ws&&S.ws.readyState===WebSocket.OPEN) S.ws.send(JSON.stringify({type:'ping'}));
    },25000);
  };
  S.ws.onmessage=e=>{ let d; try{d=JSON.parse(e.data);}catch{return;} handleWS(d); };
  S.ws.onclose=e=>{
    clearInterval(S.pingInt);
    document.getElementById('conn-bad').classList.add('show');
    if(e.code===4001){S.wsAuthFail=true;logout();return;}
    if(e.code===4002) return;
    if(S.token&&!S.wsAuthFail){
      setTimeout(()=>{if(S.token)connectWS();},S.wsDelay);
      S.wsDelay=Math.min(S.wsDelay*2,30000);
    }
  };
  S.ws.onerror=()=>{};
}

function wsSend(d) {
  if(S.ws&&S.ws.readyState===WebSocket.OPEN) S.ws.send(JSON.stringify(d));
}

function handleWS(d) {
  switch(d.type){
    case 'new_message':     onWsMsg(d.message); break;
    case 'user_status':     onWsStatus(d.user_id,d.is_online); break;
    case 'typing':          onWsTyping(d); break;
    case 'messages_read':   onWsRead(d); break;
    case 'reaction_update': onWsReact(d); break;
    case 'room_deleted':    onWsRoomDel(d.room_id); break;
    case 'error':           toast('⚠️ '+d.message,'err'); break;
  }
}

function onWsMsg(msg) {
  const room=S.rooms.find(r=>r.id===msg.room_id);
  if(room){
    room.last_message=msg;
    if(S.roomId!==msg.room_id) room.unread_count=(room.unread_count||0)+1;
    S.rooms=[room,...S.rooms.filter(r=>r.id!==msg.room_id)];
  } else { loadRooms(); return; }
  renderRooms();
  if(S.roomId===msg.room_id){
    appendMsg(msg); scrollBot(); wsSend({type:'read',room_id:msg.room_id});
  } else { playBeep(); }
}

function onWsStatus(uid,online) {
  S.rooms.forEach(r=>r.members.forEach(m=>{ if(m.id===uid) m.is_online=online; }));
  renderRooms(); updChatHead();
}

function onWsTyping(d) {
  if(d.room_id!==S.roomId) return;
  const bar=document.getElementById('tybar');
  if(d.is_typing){
    document.getElementById('tytext').textContent=`${d.username} печатает...`;
    bar.style.display='flex';
    clearTimeout(S.tyTimers[d.user_id]);
    S.tyTimers[d.user_id]=setTimeout(()=>{bar.style.display='none';},4000);
  } else { bar.style.display='none'; }
}

function onWsRead(d) {
  if(d.room_id!==S.roomId) return;
  document.querySelectorAll('.tick').forEach(el=>el.classList.add('read'));
}

function onWsReact(d) {
  if(d.room_id!==S.roomId) return;
  const mw=document.querySelector(`.mw[data-id="${d.message_id}"]`);
  if(!mw) return;
  let rxns=mw.querySelector('.rxns');
  if(!rxns){ rxns=document.createElement('div'); rxns.className='rxns'; mw.querySelector('.bbl').appendChild(rxns); }
  rxns.innerHTML=buildRxnHTML(d.reactions, d.message_id);
}

function onWsRoomDel(roomId) {
  if(S.roomId===roomId){
    document.getElementById('active-chat').style.display='none';
    document.getElementById('welcome').classList.remove('hidden');
    S.roomId=null;
  }
  S.rooms=S.rooms.filter(r=>r.id!==roomId);
  renderRooms();
  toast('Группа была удалена','err');
}

/* ════ ROOMS SIDEBAR ════════════════════════════ */
async function loadRooms() {
  S.rooms=await http('GET','/api/rooms').catch(()=>[]);
  renderRooms();
}

function renderRooms(list) {
  list=list||S.rooms;
  const el=document.getElementById('chatlist');
  if(!list.length){
    el.innerHTML='<div class="no-chats"><div class="ico">💬</div>Начните первый чат!</div>';
    return;
  }
  el.innerHTML=list.map(r=>roomItem(r)).join('');
}

function roomItem(r) {
  const isGrp=r.is_group;
  let name,color,online;
  if(!isGrp){
    const o=r.members.find(m=>m.id!==S.me.id)||r.members[0];
    name=o?dispName(o):'Чат'; color=o?o.avatar_color:'#5288c1'; online=o?o.is_online:false;
  } else { name=r.name||'Группа'; color='#5288c1'; online=false; }
  const dot=online?'<div class="av-dot"></div>':'';
  const badge=r.unread_count>0?`<div class="badge">${r.unread_count>99?'99+':r.unread_count}</div>`:'';
  const last=r.last_message;
  let prev='Нет сообщений';
  if(last){
    if(last.msg_type==='image'||last.msg_type==='gif') prev='🖼️ Изображение';
    else if(last.msg_type==='file') prev='📄 '+esc(last.content);
    else if(last.msg_type==='voice') prev='🎙️ Голосовое';
    else if(last.msg_type==='sticker') prev='😊 Стикер';
    else prev=esc((last.sender_id===S.me.id?'Вы: ':'')+last.content).substring(0,60);
  }
  const time=last?fmtTime(last.created_at):'';
  const act=r.id===S.roomId?'active':'';
  return `<div class="ci ${act}" data-id="${r.id}" onclick="openRoom(${r.id})">
    <div class="av av46" style="background:${color}">${initials(name)}${dot}</div>
    <div class="ci-info">
      <div class="ci-name">${esc(name)}</div>
      <div class="ci-prev">${isGrp?'👥 ':''} ${prev}</div>
    </div>
    <div class="ci-meta"><span class="ci-time">${time}</span>${badge}</div>
  </div>`;
}

function filterSB(q) {
  if(!q){renderRooms();return;}
  q=q.toLowerCase();
  renderRooms(S.rooms.filter(r=>roomName(r).toLowerCase().includes(q)));
}

function roomName(r) {
  if(!r.is_group){ const o=r.members.find(m=>m.id!==S.me.id); return o?dispName(o):'Чат'; }
  return r.name||'Группа';
}

/* ════ РЕНДЕР СООБЩЕНИЙ ════════════════════════ */
function renderMsgs(msgs, prepend=false) {
  const c=document.getElementById('msgs');
  if(!prepend){ c.innerHTML=''; if(S.hasMore) addLoadMore(); }
  let prevH=prepend?c.scrollHeight:0;
  let lastDate=null, lastSender=null;
  const room=S.rooms.find(r=>r.id===S.roomId);
  const isGrp=room&&room.is_group;

  const anchor=prepend?(c.querySelector('.date-sep,.mw')||null):null;
  const insertEl=el=>{ if(anchor) c.insertBefore(el,anchor); else c.appendChild(el); };

  for(const msg of msgs){
    const ds=fmtDate(msg.created_at);
    if(ds!==lastDate){
      const sep=document.createElement('div');
      sep.className='date-sep'; sep.innerHTML=`<span>${ds}</span>`;
      insertEl(sep); lastDate=ds;
    }
    const consec=lastSender===msg.sender_id;
    insertEl(buildMsgEl(msg,consec,isGrp));
    lastSender=msg.sender_id;
  }
  if(prepend) c.scrollTop+=c.scrollHeight-prevH;
}

function addLoadMore() {
  const c=document.getElementById('msgs');
  const b=document.createElement('button');
  b.className='load-more'; b.textContent='⬆ Загрузить предыдущие'; b.onclick=loadMore;
  c.insertBefore(b,c.firstChild);
}

async function loadMore() {
  if(S.loadingMore) return; S.loadingMore=true;
  const c=document.getElementById('msgs');
  const first=c.querySelector('.mw[data-id]');
  if(!first){S.loadingMore=false;return;}
  const beforeId=parseInt(first.dataset.id);
  try{
    const data=await http('GET',`/api/rooms/${S.roomId}/messages`,null,{before_id:beforeId});
    S.hasMore=data.has_more;
    if(!S.hasMore){ const b=c.querySelector('.load-more'); if(b) b.remove(); }
    if(data.messages.length) renderMsgs(data.messages,true);
  }catch(e){toast(e.message,'err');}
  S.loadingMore=false;
}

function buildMsgEl(msg, consec, isGrp) {
  const isOut=msg.sender_id===S.me.id;
  const div=document.createElement('div');
  div.className=`mw ${isOut?'out':'in'} ${consec?'consec':'first'}`;
  div.dataset.id=msg.id; div.dataset.sender=msg.sender_id;

  const s=msg.sender||{id:0,username:'Удалён',display_name:null,avatar_color:'#888',is_online:false};
  const avHTML=!isOut?(consec?`<div style="width:32px;flex-shrink:0"></div>`
    :`<div class="av av32 mav" style="background:${s.avatar_color};cursor:pointer" title="${esc(dispName(s))}">${initials(dispName(s))}</div>`):'';

  const sndrHtml=isGrp&&!isOut&&!consec
    ?`<div class="sndr" style="color:${s.avatar_color}">${esc(dispName(s))}</div>`:'';

  const contentHtml=buildMsgContent(msg);
  const rxns=msg.reactions&&Object.keys(msg.reactions).length?`<div class="rxns">${buildRxnHTML(msg.reactions,msg.id)}</div>`:'';
  const tick=isOut?`<span class="tick ${msg.is_read?'read':''}">✓✓</span>`:'';

  // Кнопки быстрых реакций
  const reactBtns=`<div class="react-btn">${REACT_EMOJIS.map(e=>`<span onclick="doReact(${msg.id},'${e}')" title="${e}">${e}</span>`).join('')}</div>`;

  div.innerHTML=`
    ${avHTML}
    <div class="bbl">
      ${sndrHtml}
      ${contentHtml}
      ${rxns}
      <div class="mmeta"><span class="mtime">${fmtTime(msg.created_at)}</span>${tick}</div>
    </div>
    ${reactBtns}`;
  return div;
}

function buildMsgContent(msg) {
  const t=msg.msg_type;
  if(t==='sticker') return `<div class="sticker">${esc(msg.content)}</div>`;
  if(t==='image'||t==='gif'){
    const src=`data:${msg.media_mime};base64,${msg.media_data}`;
    return `<img class="${t==='gif'?'msg-gif':'msg-img'}" src="${src}" loading="lazy"
      onclick="openLB(this.src)" alt="${esc(msg.content)}">`;
  }
  if(t==='voice'){
    const src=`data:${msg.media_mime||'audio/webm'};base64,${msg.media_data}`;
    const wid='vp-'+msg.id;
    return `<div class="voice-player">
      <button class="vp-btn" onclick="toggleVoice('${wid}','${src}')">▶</button>
      <div class="vp-track">
        <div class="vp-waves">${Array(18).fill(0).map((_,i)=>`<div class="vp-wave" style="height:${4+Math.abs(Math.sin(i*0.7))*14}px"></div>`).join('')}</div>
        <div class="vp-bar" onclick="seekVoice(event,'${wid}')"><div class="vp-prog" id="prog-${wid}"></div></div>
        <div class="vp-times"><span id="cur-${wid}">0:00</span><span id="dur-${wid}">—</span></div>
      </div>
      <audio id="${wid}" src="${src}" onended="voiceEnded('${wid}')"
             ontimeupdate="voiceTick('${wid}')" onloadedmetadata="voiceMeta('${wid}')"></audio>
    </div>`;
  }
  if(t==='file'){
    const src=`data:${msg.media_mime||'application/octet-stream'};base64,${msg.media_data}`;
    return `<div class="msg-file">
      <div class="msg-file-ico">📄</div>
      <div class="msg-file-info">
        <div class="msg-file-name">${esc(msg.content)}</div>
        <div class="msg-file-size">${fmtSize(msg.media_size)}</div>
        <div class="msg-file-dl" onclick="dlFile('${src}','${esc(msg.content)}')">Скачать</div>
      </div>
    </div>`;
  }
  return `<div class="txt">${esc(msg.content)}</div>`;
}

function buildRxnHTML(reactions, msgId) {
  if(!reactions||!Object.keys(reactions).length) return '';
  return Object.entries(reactions).map(([emoji,users])=>{
    const mine=users.includes(S.me.id)?'mine':'';
    const cnt=users.length;
    return `<div class="rxn-pill ${mine}" onclick="doReact(${msgId},'${emoji}')" title="${cnt} ${cnt===1?'реакция':'реакций'}">${emoji}<span class="rxn-cnt">${cnt}</span></div>`;
  }).join('');
}

function appendMsg(msg) {
  const c=document.getElementById('msgs');
  const last=c.querySelector('.mw[data-sender]:last-of-type');
  const lastS=last?parseInt(last.dataset.sender):null;
  const consec=lastS===msg.sender_id;
  const ds=fmtDate(msg.created_at);
  const lastSep=c.querySelector('.date-sep:last-of-type');
  if(!lastSep||lastSep.querySelector('span').textContent!==ds){
    const sep=document.createElement('div');
    sep.className='date-sep'; sep.innerHTML=`<span>${ds}</span>`;
    c.appendChild(sep);
  }
  const room=S.rooms.find(r=>r.id===S.roomId);
  c.appendChild(buildMsgEl(msg,consec,room&&room.is_group));
}

function scrollBot(smooth=true) {

/* ════ ОТПРАВКА ТЕКСТА ══════════════════════════ */
function sendMsg() {
  const ta=document.getElementById('msginput');
  const txt=ta.value.trim();
  if(!txt||!S.roomId) return;
  if(txt.length>4096){toast('Сообщение слишком длинное','err');return;}
  if(!S.ws||S.ws.readyState!==WebSocket.OPEN){toast('⚠️ Нет соединения');connectWS();return;}
  wsSend({type:'message',room_id:S.roomId,content:txt});
  ta.value=''; ta.style.height='auto';
  updCharCnt(ta); sendTyping(false);
  closeAttach();
}

function onKD(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function onTA(ta){
  ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,120)+'px';
  updCharCnt(ta); handleTyping();
}
function updCharCnt(ta){
  const l=ta.value.length;
  const w=ta.closest('.iwrap');
  let cnt=w.querySelector('.char-cnt');
  if(l>3800){
    if(!cnt){cnt=document.createElement('span');cnt.className='char-cnt';w.appendChild(cnt);}
    cnt.textContent=4096-l; cnt.style.color=l>4000?'#ff6b6b':'var(--t3)';
  } else if(cnt) cnt.remove();
}
function handleTyping(){
  if(!S.roomId) return;
  if(!S.wasTyping){sendTyping(true);S.wasTyping=true;}
  clearTimeout(S.tyTO);
  S.tyTO=setTimeout(()=>{sendTyping(false);S.wasTyping=false;},2500);
}
function sendTyping(on){if(S.roomId) wsSend({type:'typing',room_id:S.roomId,is_typing:on});}

  }</div>`;

async function sendSticker(emoji) {
  if(!S.roomId) return;
  closeAttach();
  // Стикеры шлём как файл через upload (msg_type=sticker через WS не пройдёт)
  // Используем отдельный вызов: создаём blob с текстом
  const blob=new Blob([emoji],{type:'text/plain'});
  const fd=new FormData(); fd.append('file',new File([blob],'sticker.txt',{type:'text/plain'}));
  // Лучше отправляем стикер через WS как особый тип текстового сообщения
  // Но сервер воспринимает только text type в WS. Добавим префикс:
  wsSend({type:'sticker',room_id:S.roomId,content:emoji});
}

// Добавляем обработчик sticker в WS handle:
// (уже включён в handleWS как new_message, нужно добавить в _on_message на сервере)
// Обходим: отправляем через upload API специальный файл
// Упрощённый вариант — отправляем через обычный message с префиксом STICKER:

/* ════ ГОЛОСОВЫЕ СООБЩЕНИЯ ══════════════════════ */
async function startRec() {
  closeAttach();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    S.recStream=stream; S.recChunks=[];
    S.mediaRec=new MediaRecorder(stream, {mimeType:MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/ogg'});
    S.mediaRec.ondataavailable=e=>{if(e.data.size>0)S.recChunks.push(e.data);};
    S.mediaRec.onstop=()=>sendVoice();
    S.mediaRec.start(100);
    S.recSec=0;
    document.getElementById('voicerec').classList.remove('hidden');
    document.getElementById('rec-time').textContent='0:00';
    S.recTimer=setInterval(()=>{
      S.recSec++;
      document.getElementById('rec-time').textContent=fmtDur(S.recSec);
      if(S.recSec>=120) stopRec(); // авто-стоп через 2 минуты
    },1000);
    // Анимированные волны
    const wc=document.getElementById('rec-waves');
    wc.innerHTML=Array(20).fill(0).map(()=>'<div class="rec-wave" style="height:4px"></div>').join('');
    S.recWaveInt=setInterval(()=>{
      wc.querySelectorAll('.rec-wave').forEach(w=>{
        w.style.height=(4+Math.random()*20)+'px';
      });
    },100);
  }catch(e){toast('Нет доступа к микрофону','err');}
}

function stopRec() {
  if(S.mediaRec&&S.mediaRec.state!=='inactive') S.mediaRec.stop();
  S.recStream&&S.recStream.getTracks().forEach(t=>t.stop());
  clearInterval(S.recTimer); clearInterval(S.recWaveInt);
  document.getElementById('voicerec').classList.add('hidden');
}

function cancelRec() {
  if(S.mediaRec) S.mediaRec.onstop=null;
  stopRec(); S.recChunks=[];
}

async function sendVoice() {
  if(!S.recChunks.length||!S.roomId) return;
  const mime=S.recChunks[0].type||'audio/webm';
  const blob=new Blob(S.recChunks,{type:mime});
  const ext=mime.includes('ogg')?'ogg':'webm';
  const fd=new FormData();
  fd.append('file',new File([blob,`voice.${ext}`],`voice.${ext}`,{type:mime}));
  try{
    await httpForm(`/api/rooms/${S.roomId}/upload`,fd);
  }catch(e){toast(e.message,'err');}
}

/* ════ ГОЛОСОВОЙ ПЛЕЕР ══════════════════════════ */
function toggleVoice(wid, src) {
  const audio=document.getElementById(wid);
  const btn=audio.parentElement.querySelector('.vp-btn');
  if(audio.paused){audio.play();btn.textContent='⏸';}
  else{audio.pause();btn.textContent='▶';}
}
function voiceEnded(wid) {
  document.querySelector(`#${wid}`).parentElement.querySelector('.vp-btn').textContent='▶';
  document.getElementById(`prog-${wid}`).style.width='0%';
  document.getElementById(`cur-${wid}`).textContent='0:00';
}
function voiceTick(wid) {
  const audio=document.getElementById(wid);
  if(!audio.duration) return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById(`prog-${wid}`).style.width=pct+'%';
  document.getElementById(`cur-${wid}`).textContent=fmtDur(Math.floor(audio.currentTime));
}
function voiceMeta(wid) {
  const audio=document.getElementById(wid);
  document.getElementById(`dur-${wid}`).textContent=fmtDur(Math.floor(audio.duration||0));
}
function seekVoice(e, wid) {
  const bar=e.currentTarget;
  const audio=document.getElementById(wid);
  if(!audio.duration) return;
  const pct=e.offsetX/bar.offsetWidth;
  audio.currentTime=pct*audio.duration;
}

function toggleGrpM(uid){

  renderGrpUsers(S.allUsers.filter(u=>{
    const q=document.getElementById('grp-s').value.toLowerCase();
    return !q||dispName(u).toLowerCase().includes(q);
  }));
}

async function createGrp(){
  const name=document.getElementById('grp-name').value.trim();
  if(!name){toast('Введите название','err');return;}
  if(!S.grpSel.size){toast('Выберите участников','err');return;}
  try{
    const room=await http('POST','/api/rooms/group',{name,member_ids:[...S.grpSel]});
    closeM('m-new'); S.rooms.unshift(room); renderRooms(); openRoom(room.id);
  }catch(e){toast(e.message,'err');}
}

/* ════ ПРОФИЛЬ ══════════════════════════════════ */
function openProfile() {
  const u=S.me;
  const avEl2=document.getElementById('prof-av-el');
  avEl2.textContent=initials(dispName(u)); avEl2.style.background=u.avatar_color;
  document.getElementById('prof-dn').value=u.display_name||'';
  document.getElementById('prof-bio').value=u.bio||'';
  // Строим пикер цветов
  const cp=document.getElementById('color-picker');
  cp.innerHTML=COLORS.map(c=>`<div class="cp-dot ${c===u.avatar_color?'sel':''}"
    style="background:${c}" onclick="pickColor('${c}')" title="${c}"></div>`).join('');
  openM('m-prof');
}

function pickColor(c){
  S.me.avatar_color=c;
  const av=document.getElementById('prof-av-el');
  av.style.background=c;
  document.querySelectorAll('.cp-dot').forEach(d=>d.classList.toggle('sel',d.style.background===c||d.title===c));
}

async function saveProfile(){
  const dn=document.getElementById('prof-dn').value.trim();
  const bio=document.getElementById('prof-bio').value.trim();
  const color=S.me.avatar_color;
  try{
    const u=await http('PATCH','/api/me',{display_name:dn||null,bio:bio||null,avatar_color:color});
    S.me=u; updMyInfo(); updChatHead();
    closeM('m-prof'); toast('Профиль сохранён','ok');
  }catch(e){toast(e.message,'err');}
}

/* ════ ЗВУК ═════════════════════════════════════ */
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=880;o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+.1);
    g.gain.setValueAtTime(.07,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.25);
    o.start();o.stop(ctx.currentTime+.25);
  }catch{}
}
