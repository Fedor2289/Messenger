<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   ПЕРЕМЕННЫЕ ТЕМЫ
════════════════════════════════════════════════ */
:root {
  --bg0: #0e1621;
  --bg1: #17212b;
  --bg2: #242f3d;
  --bg3: #2b3a4a;
  --bg-active: #2b5278;
  --accent: #5288c1;
  --accent2: #3d6fa8;
  --bubble-in: #182533;
  --bubble-out: #2b5278;
  --text1: #e8eaed;
  --text2: #8a9bac;
  --text3: #5d7a96;
  --border: #1f2d3a;
  --green: #4dcd5e;
  --red: #e74c3c;
  --shadow: 0 8px 32px rgba(0,0,0,.45);
  --r: 12px;
  --r-sm: 8px;
  --tr: .18s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg0);
  color: var(--text1); overflow: hidden; font-size: 14px; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

/* ════════════════════════════════════════════════
   УТИЛИТЫ
════════════════════════════════════════════════ */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.flex-1 { flex: 1; min-width: 0; }
.center { display: flex; align-items: center; justify-content: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ════════════════════════════════════════════════
   АВАТАР
════════════════════════════════════════════════ */
.av { border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-weight: 600; color: #fff; flex-shrink: 0; position: relative; text-transform: uppercase; }
.av-46 { width: 46px; height: 46px; font-size: 17px; }
.av-40 { width: 40px; height: 40px; font-size: 15px; }
.av-32 { width: 32px; height: 32px; font-size: 11px; }
.av-dot { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px;
  background: var(--green); border: 2px solid var(--bg1); border-radius: 50%; }
.av-dot-active { border-color: var(--bg-active); }

/* ════════════════════════════════════════════════
   КНОПКИ
════════════════════════════════════════════════ */
.btn-icon { width: 36px; height: 36px; border: none; background: none; color: var(--text2);
  border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all var(--tr); flex-shrink: 0; }
.btn-icon:hover { background: var(--bg3); color: var(--text1); }
.btn-icon:active { transform: scale(.93); }

.btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg,var(--accent),var(--accent2));
  border: none; border-radius: var(--r-sm); color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all var(--tr); letter-spacing: .3px; font-family: inherit; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(82,136,193,.4); }
.btn-primary:active { transform: none; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ════════════════════════════════════════════════
   ФОРМЫ
════════════════════════════════════════════════ */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text2);
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: .6px; }
.form-input { width: 100%; padding: 12px 16px; background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--r-sm); color: var(--text1); font-size: 14px; font-family: inherit;
  transition: border-color var(--tr); outline: none; }
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }

/* ════════════════════════════════════════════════
   ЭКРАН АВТОРИЗАЦИИ
════════════════════════════════════════════════ */
#auth-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg0); z-index: 100; }

.auth-card { background: var(--bg1); border: 1px solid var(--border); border-radius: 20px;
  padding: 40px; width: 100%; max-width: 380px; box-shadow: var(--shadow);
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1); }

@keyframes popIn { from { opacity:0; transform: translateY(20px) scale(.97); } to { opacity:1; transform:none; } }

.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo-icon { width: 72px; height: 72px; background: linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius: 22px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 14px; box-shadow: 0 8px 24px rgba(82,136,193,.3); }
.auth-logo h1 { font-size: 22px; font-weight: 600; }
.auth-logo p  { font-size: 13px; color: var(--text2); margin-top: 4px; }

.auth-tabs { display: flex; background: var(--bg2); border-radius: var(--r-sm);
  padding: 3px; margin-bottom: 24px; gap: 2px; }
.auth-tab { flex: 1; padding: 9px; border: none; background: none; color: var(--text2);
  font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer;
  transition: all var(--tr); font-family: inherit; }
.auth-tab.on { background: var(--accent); color: #fff; }

.auth-error { background: rgba(231,76,60,.12); border: 1px solid rgba(231,76,60,.3);
  border-radius: var(--r-sm); padding: 10px 14px; color: #ff6b6b; font-size: 13px;
  margin-top: 12px; }

/* ════════════════════════════════════════════════
   ГЛАВНЫЙ LAYOUT
════════════════════════════════════════════════ */
#app { display: none; height: 100vh; overflow: hidden; }
.layout { display: flex; height: 100vh; }

/* ════════════════════════════════════════════════
   САЙДБАР
════════════════════════════════════════════════ */
.sidebar { width: 320px; min-width: 320px; background: var(--bg1); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; flex-shrink: 0; transition: transform .3s ease; }

.sidebar-head { padding: 0 14px; display: flex; align-items: center; gap: 10px;
  height: 60px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-title { flex: 1; font-size: 18px; font-weight: 600; }

.search-wrap { padding: 10px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-inner { position: relative; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 14px; pointer-events: none; }
.search-input { width: 100%; padding: 9px 12px 9px 34px; background: var(--bg2); border: none;
  border-radius: 20px; color: var(--text1); font-size: 13.5px; font-family: inherit; outline: none; }
.search-input::placeholder { color: var(--text3); }

/* Список чатов */
.chat-list { flex: 1; overflow-y: auto; }
.chat-empty-hint { text-align: center; padding: 40px 16px; color: var(--text3); font-size: 13px; }
.chat-empty-hint .ico { font-size: 40px; margin-bottom: 12px; }

.chat-item { display: flex; align-items: center; padding: 10px 14px; gap: 12px;
  cursor: pointer; transition: background var(--tr); }
.chat-item:hover { background: var(--bg3); }
.chat-item.active { background: var(--bg-active); }
.chat-item.active .av-dot { border-color: var(--bg-active); }

.chat-info { flex: 1; min-width: 0; }
.chat-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-preview { font-size: 12.5px; color: var(--text2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; margin-top: 2px; }
.chat-item.active .chat-preview { color: rgba(255,255,255,.6); }

.chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.chat-time { font-size: 11px; color: var(--text3); }
.chat-item.active .chat-time { color: rgba(255,255,255,.5); }
.unread-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 600;
  padding: 2px 6px; border-radius: 10px; min-width: 20px; text-align: center; }

/* Подвал сайдбара: текущий пользователь */
.sidebar-foot { border-top: 1px solid var(--border); padding: 10px 14px; display: flex;
  align-items: center; gap: 10px; flex-shrink: 0; }
.my-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.my-status { font-size: 11px; color: var(--green); display: flex; align-items: center; gap: 4px; }
.my-status::before { content:''; width:6px; height:6px; background:var(--green); border-radius:50%; }

/* Статус соединения */
.conn-status { display: none; font-size: 11px; padding: 3px 8px; border-radius: 10px; margin-right: 4px; }
.conn-status.offline { display: flex; align-items: center; gap: 4px;
  background: rgba(231,76,60,.15); color: #ff6b6b; }
.conn-status.offline::before { content:''; width:6px; height:6px; background:#ff6b6b; border-radius:50%; }

/* ════════════════════════════════════════════════
   ОБЛАСТЬ ЧАТА
════════════════════════════════════════════════ */
.chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg0); min-width: 0;
  background-image: radial-gradient(ellipse at 20% 60%, rgba(82,136,193,.04) 0, transparent 55%); }

/* Заглушка "выберите чат" */
.chat-welcome { flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; color: var(--text3); }
.chat-welcome .ico { font-size: 64px; opacity: .35; }
.chat-welcome h3 { font-size: 20px; font-weight: 500; color: var(--text2); }

/* Шапка чата */
.chat-head { padding: 0 16px; height: 60px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; background: var(--bg1); flex-shrink: 0; }
.chat-head-info { flex: 1; min-width: 0; }
.chat-head-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-head-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.chat-head-sub.online { color: var(--green); }

/* Контейнер сообщений */
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 2px; }

/* Кнопка "загрузить ещё" */
.load-more-btn { align-self: center; padding: 6px 18px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 20px; color: var(--text2); font-size: 13px;
  cursor: pointer; transition: all var(--tr); font-family: inherit; margin-bottom: 8px; }
.load-more-btn:hover { background: var(--bg3); color: var(--text1); }

/* Разделитель даты */
.date-sep { text-align: center; margin: 10px 0; }
.date-sep span { background: rgba(82,136,193,.15); color: var(--text2); font-size: 11.5px;
  font-weight: 500; padding: 4px 12px; border-radius: 10px; }

/* Сообщение */
.msg-wrap { display: flex; align-items: flex-end; gap: 6px; }
.msg-wrap.out { flex-direction: row-reverse; }
.msg-wrap.consecutive .msg-av { visibility: hidden; }
.msg-av { flex-shrink: 0; }

.bubble { max-width: 66%; padding: 8px 12px; border-radius: 16px; line-height: 1.5;
  animation: msgPop .2s cubic-bezier(.34,1.56,.64,1); }
@keyframes msgPop { from { opacity:0; transform:translateY(6px) scale(.97); } to { opacity:1; transform:none; } }

.msg-wrap:not(.out) .bubble { background: var(--bubble-in); border-bottom-left-radius: 4px; }
.msg-wrap.out       .bubble { background: var(--bubble-out); border-bottom-right-radius: 4px; }
.msg-wrap.first .bubble { border-top-left-radius: 16px; }

.bubble .sndr { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
.bubble .txt  { font-size: 14px; word-break: break-word; white-space: pre-wrap; }
.bubble .meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; }
.msg-time { font-size: 11px; color: rgba(255,255,255,.4); }
.msg-tick { font-size: 12px; color: rgba(255,255,255,.4); }
.msg-tick.read { color: #5dcfff; }

/* Typing indicator */
.typing-bar { height: 28px; padding: 0 16px; display: none; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--text2); font-style: italic; flex-shrink: 0; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span { width: 5px; height: 5px; background: var(--text2); border-radius: 50%;
  animation: dot 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes dot { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-4px);opacity:1} }

/* Поле ввода */
.input-area { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--bg1);
  display: flex; align-items: flex-end; gap: 8px; flex-shrink: 0; }
.input-wrap { flex: 1; background: var(--bg2); border: 1.5px solid var(--border); border-radius: 22px;
  padding: 9px 14px; display: flex; align-items: flex-end; gap: 8px; transition: border-color var(--tr); }
.input-wrap:focus-within { border-color: var(--accent); }
.input-ta { flex: 1; background: none; border: none; outline: none; resize: none; color: var(--text1);
  font-size: 14px; font-family: inherit; line-height: 1.5; max-height: 120px; min-height: 22px;
  overflow-y: auto; }
.input-ta::placeholder { color: var(--text3); }
.char-cnt { font-size: 11px; color: var(--text3); flex-shrink: 0; align-self: flex-end; padding-bottom: 1px; }

.send-btn { width: 42px; height: 42px; background: linear-gradient(135deg,var(--accent),var(--accent2));
  border: none; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 16px; flex-shrink: 0; transition: all var(--tr);
  box-shadow: 0 2px 12px rgba(82,136,193,.4); }
.send-btn:hover { transform: scale(1.07); }
.send-btn:active { transform: scale(.94); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ════════════════════════════════════════════════
   МОДАЛЬНЫЕ ОКНА
════════════════════════════════════════════════ */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
  z-index: 50; display: none; align-items: center; justify-content: center; }
.overlay.show { display: flex; animation: fadeIn .15s ease; }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }

.modal { background: var(--bg1); border: 1px solid var(--border); border-radius: 20px;
  width: 100%; max-width: 420px; margin: 16px; box-shadow: var(--shadow);
  animation: popIn .25s cubic-bezier(.34,1.56,.64,1); overflow: hidden; }
.modal-head { padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-body { padding: 16px 22px 22px; }
.modal-tabs { display: flex; background: var(--bg2); border-radius: var(--r-sm);
  padding: 3px; margin-bottom: 16px; gap: 2px; }
.modal-tab { flex: 1; padding: 8px; border: none; background: none; color: var(--text2);
  font-size: 13px; font-weight: 500; border-radius: 6px; cursor: pointer;
  transition: all var(--tr); font-family: inherit; }
.modal-tab.on { background: var(--accent); color: #fff; }

/* Список пользователей в модалке */
.user-list { display: flex; flex-direction: column; gap: 2px; max-height: 280px;
  overflow-y: auto; margin-top: 12px; }
.user-row { display: flex; align-items: center; gap: 12px; padding: 9px 10px;
  border-radius: var(--r-sm); cursor: pointer; transition: background var(--tr); }
.user-row:hover { background: var(--bg3); }
.user-row.selected { background: rgba(82,136,193,.25); }
.user-row-info { flex: 1; min-width: 0; }
.user-row-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-row-status { font-size: 12px; color: var(--text3); }
.user-row-status.online { color: var(--green); }
.user-row-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; transition: all var(--tr); }
.user-row.selected .user-row-check { background: var(--accent); border-color: var(--accent);
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; }
.selected-count { font-size: 13px; color: var(--accent); margin-top: 10px; min-height: 18px; }

/* ════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════ */
#toasts { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 10px 16px; font-size: 13px; color: var(--text1); box-shadow: var(--shadow);
  animation: msgPop .25s ease; white-space: nowrap; }
.toast.err { border-color: rgba(231,76,60,.4); background: rgba(231,76,60,.15); color: #ff6b6b; }

/* ════════════════════════════════════════════════
   ЗАГРУЗЧИК
════════════════════════════════════════════════ */
.spinner { width: 22px; height: 22px; border: 2.5px solid rgba(255,255,255,.15);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════════════
   МОБАЙЛ
════════════════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { position: fixed; left:0; top:0; bottom:0; z-index: 20; width: 100% !important;
    min-width: unset; }
  .sidebar.slide-out { transform: translateX(-100%); }
  .chat-area { position: fixed; inset: 0; display: none; }
  .chat-area.visible { display: flex; }
  .chat-welcome { display: none; }
  .back-btn { display: flex !important; }
}
.back-btn { display: none; }
</style>
</head>
<body>

<!-- ═══════════════════ AUTH ═══════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <h1>Messenger</h1>
      <p>Мгновенные сообщения</p>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="switchAuthTab('login')">Войти</button>
      <button class="auth-tab"    onclick="switchAuthTab('reg')">Регистрация</button>
    </div>

    <div id="tab-login">
      <div class="form-group">
        <label class="form-label">Имя пользователя</label>
        <input class="form-input" id="l-user" type="text" placeholder="username" autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="doLogin()">Войти</button>
    </div>

    <div id="tab-reg" class="hidden">
      <div class="form-group">
        <label class="form-label">Имя пользователя</label>
        <input class="form-input" id="r-user" type="text" placeholder="только буквы, цифры, _ -">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" id="r-email" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input class="form-input" id="r-pass" type="password" placeholder="минимум 4 символа">
      </div>
      <button class="btn-primary" onclick="doRegister()">Создать аккаунт</button>
    </div>

    <div id="auth-err" class="auth-error hidden"></div>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app">
  <div class="layout">

    <!-- Сайдбар -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">Чаты</span>
        <div class="flex gap-2" style="align-items:center">
          <span class="conn-status" id="conn-status">нет связи</span>
          <button class="btn-icon" title="Новый чат" onclick="openNewChat()">✏️</button>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-inner">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="sidebar-search" type="text" placeholder="Поиск чатов..."
                 oninput="filterSidebar(this.value)">
        </div>
      </div>

      <div class="chat-list" id="chat-list">
        <div class="chat-empty-hint"><div class="ico">💬</div>Нажмите ✏️ чтобы начать чат</div>
      </div>

      <div class="sidebar-foot">
        <div class="av av-32" id="my-av">?</div>
        <div class="flex-1" style="min-width:0">
          <div class="my-name" id="my-name">—</div>
          <div class="my-status">онлайн</div>
        </div>
        <button class="btn-icon" title="Выйти" onclick="logout()">🚪</button>
      </div>
    </div>

    <!-- Область чата -->
    <div class="chat-area" id="chat-area">
      <div class="chat-welcome" id="chat-welcome">
        <div class="ico">💬</div>
        <h3>Выберите чат</h3>

<!-- ═══════════════════ ТОСТЫ ═══════════════════ -->
<div id="toasts"></div>

<script>
'use strict';
/* ════════════════════════════════════════════════
   СОСТОЯНИЕ ПРИЛОЖЕНИЯ
════════════════════════════════════════════════ */
const S = {
  token:       localStorage.getItem('token'),
  me:          null,       // текущий пользователь
  rooms:       [],         // список комнат
  roomId:      null,       // открытая комната
  ws:          null,
  wsDelay:     1000,
  wsAuthFail:  false,
  // UI state
  hasMore:     false,      // есть ли ещё сообщения для загрузки
  loadingMore: false,
  typingTimers:{},
  typingTO:    null,
  wasTyping:   false,
  // Список пользователей (кэш для модалок)
  allUsers:    [],
  groupSel:    new Set(),  // выбранные для группы
};

const API = window.location.origin;
const WS  = API.replace(/^http/, 'ws');

/* ════════════════════════════════════════════════
   УТИЛИТЫ
════════════════════════════════════════════════ */
async function http(method, path, body, params = {}) {
  const url = new URL(API + path);
  if (S.token) url.searchParams.set('token', S.token);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url, {
    method,
    headers: {'Content-Type': 'application/json'},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({detail: 'Ошибка сервера'}));
    throw new Error(e.detail || 'Ошибка');
  }
  return r.json();
}

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
}

function fmtDate(iso) {
  const d = new Date(iso), t = new Date();
  const y = new Date(t); y.setDate(y.getDate()-1);
  if (d.toDateString() === t.toDateString()) return 'Сегодня';
  if (d.toDateString() === y.toDateString()) return 'Вчера';
  return d.toLocaleDateString('ru', {day:'numeric', month:'long'});
}

function toast(msg, err=false) {
  const el = document.createElement('div');
  el.className = 'toast' + (err?' err':'');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function initials(name) { return name ? name[0].toUpperCase() : '?'; }

function avEl(user, size='av-46') {
  const dot = user.is_online ? '<div class="av-dot"></div>' : '';
  return `<div class="av ${size}" style="background:${user.avatar_color}">${initials(user.username)}${dot}</div>`;
}

/* ════════════════════════════════════════════════
   АВТОРИЗАЦИЯ
════════════════════════════════════════════════ */
function switchAuthTab(t) {
  document.getElementById('tab-login').classList.toggle('hidden', t !== 'login');
  document.getElementById('tab-reg').classList.toggle('hidden', t !== 'reg');
  document.querySelectorAll('.auth-tab').forEach((el,i) =>
    el.classList.toggle('on', (i===0&&t==='login')||(i===1&&t==='reg')));
  hideAuthErr();
}

function showAuthErr(msg) {
  const el = document.getElementById('auth-err');
  el.textContent = msg; el.classList.remove('hidden');
}
function hideAuthErr() { document.getElementById('auth-err').classList.add('hidden'); }

async function doLogin() {
  hideAuthErr();
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!username || !password) { showAuthErr('Заполните все поля'); return; }
  try {
    const d = await http('POST', '/api/login', {username, password});
    setAuth(d);
  } catch(e) { showAuthErr(e.message); }
}

async function doRegister() {
  hideAuthErr();
  const username = document.getElementById('r-user').value.trim();
  const email    = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  if (!username || !email || !password) { showAuthErr('Заполните все поля'); return; }
  try {
    const d = await http('POST', '/api/register', {username, email, password});
    setAuth(d);
  } catch(e) { showAuthErr(e.message); }
}

function setAuth(data) {
  S.token = data.access_token;
  S.me    = data.user;
  localStorage.setItem('token', S.token);
  bootApp();
}

function logout() {
  localStorage.removeItem('token');
  if (S.ws) { S.ws.onclose = null; S.ws.close(); }
  S.token = null; S.me = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('auth-screen').style.display!=='none') {
    const isLogin = !document.getElementById('tab-login').classList.contains('hidden');
    if (isLogin) doLogin(); else doRegister();
  }
});

/* ════════════════════════════════════════════════
   ЗАПУСК
════════════════════════════════════════════════ */
async function bootApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  const u = S.me;
  const myAv = document.getElementById('my-av');
  myAv.textContent = initials(u.username);
  myAv.style.background = u.avatar_color;
  document.getElementById('my-name').textContent = u.username;

  await loadRooms();
  connectWS();
}

async function tryAutoLogin() {
  if (!S.token) return;
  try {
    S.me = await http('GET', '/api/me');
    bootApp();
  } catch { localStorage.removeItem('token'); S.token = null; }
}

tryAutoLogin();

/* ════════════════════════════════════════════════
   WEBSOCKET
════════════════════════════════════════════════ */
function connectWS() {
  if (S.ws) { S.ws.onclose = null; S.ws.close(); }
  clearInterval(S.pingInt);

  S.ws = new WebSocket(`${WS}/ws/${S.token}`);

  S.ws.onopen = () => {
    S.wsDelay   = 1000;
    S.wsAuthFail = false;
    setConnStatus(true);
    S.pingInt = setInterval(() => {
      if (S.ws && S.ws.readyState === WebSocket.OPEN)
        S.ws.send(JSON.stringify({type:'ping'}));
    }, 25000);
  };

  S.ws.onmessage = e => {
    let d; try { d = JSON.parse(e.data); } catch { return; }
    handleWS(d);
  };

  S.ws.onclose = e => {
    clearInterval(S.pingInt);
    setConnStatus(false);
    if (e.code === 4001) { S.wsAuthFail = true; logout(); return; }
    if (e.code === 4002) return; // вытеснен новым соединением
    if (S.token && !S.wsAuthFail) {
      setTimeout(() => { if (S.token) connectWS(); }, S.wsDelay);
      S.wsDelay = Math.min(S.wsDelay * 2, 30000);
    }
  };
  S.ws.onerror = () => {};
}

function wsSend(data) {
  if (S.ws && S.ws.readyState === WebSocket.OPEN)
    S.ws.send(JSON.stringify(data));
}

function setConnStatus(online) {
  document.getElementById('conn-status').classList.toggle('offline', !online);
}

function handleWS(d) {
  switch(d.type) {
    case 'new_message':    onWsNewMsg(d.message); break;
    case 'user_status':    onWsStatus(d.user_id, d.is_online); break;
    case 'typing':         onWsTyping(d); break;
    case 'messages_read':  onWsRead(d); break;
    case 'error':          toast('⚠️ ' + d.message, true); break;
  }
}

function onWsNewMsg(msg) {
  // Обновляем сайдбар
  const room = S.rooms.find(r => r.id === msg.room_id);
  if (room) {
    room.last_message = msg;
    // Если чат не открыт — увеличиваем счётчик
    if (S.roomId !== msg.room_id) room.unread_count = (room.unread_count||0) + 1;
    // Поднимаем чат наверх
    S.rooms = [room, ...S.rooms.filter(r => r.id !== msg.room_id)];
  } else {
    loadRooms(); // новый чат — перезагружаем список
  }
  renderRooms();

  // Добавляем в открытый чат
  if (S.roomId === msg.room_id) {
    appendMsg(msg);
    scrollBottom();
    // Отправляем "прочитано"
    wsSend({type:'read', room_id: msg.room_id});
  } else {
    playBeep();
  }
}

function onWsStatus(userId, online) {
  // Обновляем members в S.rooms
  S.rooms.forEach(r => r.members.forEach(m => {
    if (m.id === userId) m.is_online = online;
  }));
  renderRooms();
  // Обновляем шапку открытого чата
  updateChatHead();
}

function onWsTyping(d) {
  if (d.room_id !== S.roomId) return;
  const bar = document.getElementById('typing-bar');
  if (d.is_typing) {
    document.getElementById('typing-text').textContent = `${d.username} печатает...`;
    bar.style.display = 'flex';
    clearTimeout(S.typingTimers[d.user_id]);
    S.typingTimers[d.user_id] = setTimeout(() => { bar.style.display='none'; }, 4000);
  } else {
    bar.style.display = 'none';
  }
}

function onWsRead(d) {
  if (d.room_id !== S.roomId) return;
  // Помечаем галочки прочитанными
  document.querySelectorAll('.msg-tick').forEach(el => el.classList.add('read'));
}

/* ════════════════════════════════════════════════
   КОМНАТЫ — САЙДБАР
════════════════════════════════════════════════ */
async function loadRooms() {
  S.rooms = await http('GET', '/api/rooms').catch(() => []);
  renderRooms();
}

function renderRooms(rooms) {
  const list = rooms || S.rooms;
  const el = document.getElementById('chat-list');
  if (!list.length) {
    el.innerHTML = '<div class="chat-empty-hint"><div class="ico">💬</div>Начните первый чат!</div>';
    return;
  }
  el.innerHTML = list.map(r => roomItem(r)).join('');
}

function roomItem(r) {
  const isGroup = r.is_group;
  let name, color, online;
  if (!isGroup) {
    const other = r.members.find(m => m.id !== S.me.id) || r.members[0];
    name   = other ? other.username : 'Чат';
    color  = other ? other.avatar_color : '#5288c1';
    online = other ? other.is_online : false;
  } else {
    name   = r.name || 'Группа';
    color  = '#5288c1';
    online = false;
  }

  const dot   = online ? '<div class="av-dot"></div>' : '';
  const badge = r.unread_count > 0
    ? `<div class="unread-badge">${r.unread_count > 99 ? '99+' : r.unread_count}</div>` : '';
  const last  = r.last_message;
  const prev  = last
    ? esc((last.sender_id === S.me.id ? 'Вы: ' : '') + last.content).substring(0,60)
    : 'Нет сообщений';
  const time  = last ? fmtTime(last.created_at) : '';
  const act   = r.id === S.roomId ? 'active' : '';

  return `<div class="chat-item ${act}" data-id="${r.id}" onclick="openRoom(${r.id})">
    <div class="av av-46" style="background:${color}">${initials(name)}${dot}</div>
    <div class="chat-info">
      <div class="chat-name">${esc(name)}</div>
      <div class="chat-preview">${isGroup?'👥 ':''} ${prev}</div>
    </div>
    <div class="chat-meta"><span class="chat-time">${time}</span>${badge}</div>
  </div>`;
}

function filterSidebar(q) {
  if (!q) { renderRooms(); return; }
  q = q.toLowerCase();
  renderRooms(S.rooms.filter(r => roomName(r).toLowerCase().includes(q)));
}

function roomName(r) {
  if (!r.is_group) {
    const o = r.members.find(m => m.id !== S.me.id);
    return o ? o.username : 'Чат';
  }
  return r.name || 'Группа';
}

/* ════════════════════════════════════════════════
   ОТКРЫТИЕ ЧАТА
════════════════════════════════════════════════ */
async function openRoom(roomId) {
  S.roomId = roomId;
  const room = S.rooms.find(r => r.id === roomId);

  // Сбрасываем unread
  if (room) { room.unread_count = 0; }
  renderRooms();

  // Обновляем шапку
  updateChatHead();

  // Показываем чат
  document.getElementById('chat-welcome').classList.add('hidden');
  document.getElementById('active-chat').classList.remove('hidden');
  // Мобайл
  document.getElementById('sidebar').classList.add('slide-out');
  document.getElementById('chat-area').classList.add('visible');

  // Загружаем сообщения
  const container = document.getElementById('messages');
  container.innerHTML = '<div class="spinner" style="padding:20px 0"></div>';
  S.hasMore = false;
  S.loadingMore = false;

  try {
    const data = await http('GET', `/api/rooms/${roomId}/messages`);
    S.hasMore = data.has_more;
    renderMessages(data.messages, false);
    scrollBottom(false);
    // Отправляем "прочитано"
    wsSend({type:'read', room_id: roomId});
  } catch(e) {
    container.innerHTML = `<div style="text-align:center;color:var(--text3);padding:20px">${e.message}</div>`;
  }

  document.getElementById('msg-input').focus();
}

function updateChatHead() {
  if (!S.roomId) return;
  const room = S.rooms.find(r => r.id === S.roomId);
  if (!room) return;

  let name, color, sub, isGroup = room.is_group;
  if (!isGroup) {
    const o = room.members.find(m => m.id !== S.me.id) || room.members[0];
    name  = o ? o.username : 'Чат';
    color = o ? o.avatar_color : '#5288c1';
    sub   = o && o.is_online ? 'онлайн' : 'оффлайн';
  } else {
    name  = room.name || 'Группа';
    color = '#5288c1';
    sub   = `${room.members.length} участников`;
  }

  const av = document.getElementById('ch-av');
  av.textContent = initials(name); av.style.background = color;
  document.getElementById('ch-name').textContent = name;
  const subEl = document.getElementById('ch-sub');
  subEl.textContent = sub;
  subEl.className = 'chat-head-sub' + (!isGroup && sub==='онлайн' ? ' online' : '');

  // Показываем кнопку участников для групп
  document.getElementById('members-btn').style.display = isGroup ? 'flex' : 'none';
}

function goBack() {
  document.getElementById('sidebar').classList.remove('slide-out');
  document.getElementById('chat-area').classList.remove('visible');
}

/* ════════════════════════════════════════════════
   РЕНДЕР СООБЩЕНИЙ
════════════════════════════════════════════════ */
function renderMessages(msgs, prepend=false) {
  const c = document.getElementById('messages');

  if (!prepend) {
    c.innerHTML = '';
    // Кнопка "загрузить ещё"
    if (S.hasMore) addLoadMoreBtn();
  }

  // Если prepend — нужно сохранить позицию прокрутки
  let prevHeight = 0;
  if (prepend) prevHeight = c.scrollHeight;

  let lastDate = prepend ? null : null;
  let lastSender = null;
  const room = S.rooms.find(r => r.id === S.roomId);
  const isGroup = room && room.is_group;

  if (prepend && msgs.length) {
    // Вставляем перед первым сообщением (после кнопки)
    const anchor = c.querySelector('.date-sep, .msg-wrap') || null;
    for (const msg of msgs) {
      const dateStr = fmtDate(msg.created_at);
      if (dateStr !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'date-sep'; sep.innerHTML = `<span>${dateStr}</span>`;
        anchor ? c.insertBefore(sep, anchor) : c.appendChild(sep);
        lastDate = dateStr;
      }
      const consecutive = lastSender === msg.sender_id;
      const el = buildMsgEl(msg, consecutive, isGroup);
      anchor ? c.insertBefore(el, anchor) : c.appendChild(el);
      lastSender = msg.sender_id;
    }
    // Восстанавливаем скролл
    c.scrollTop += c.scrollHeight - prevHeight;
  } else {
    const frag = document.createDocumentFragment();
    for (const msg of msgs) {
      const dateStr = fmtDate(msg.created_at);
      if (dateStr !== lastDate) {
        const sep = document.createElement('div');
        sep.className = 'date-sep'; sep.innerHTML = `<span>${dateStr}</span>`;
        frag.appendChild(sep); lastDate = dateStr;
      }
      const consecutive = lastSender === msg.sender_id;
      frag.appendChild(buildMsgEl(msg, consecutive, isGroup));
      lastSender = msg.sender_id;
    }
    c.appendChild(frag);
    if (S.hasMore) addLoadMoreBtn();
  }
}

function addLoadMoreBtn() {
  const c = document.getElementById('messages');
  const existing = c.querySelector('.load-more-btn');
  if (existing) existing.remove();
  const btn = document.createElement('button');
  btn.className = 'load-more-btn';
  btn.textContent = '⬆ Загрузить предыдущие';
  btn.onclick = loadMore;
  c.insertBefore(btn, c.firstChild);
}

async function loadMore() {
  if (S.loadingMore) return;
  S.loadingMore = true;
  const c = document.getElementById('messages');
  // Находим ID первого сообщения
  const firstMsg = c.querySelector('.msg-wrap[data-id]');
  if (!firstMsg) { S.loadingMore = false; return; }
  const beforeId = parseInt(firstMsg.dataset.id);
  try {
    const data = await http('GET', `/api/rooms/${S.roomId}/messages`, null, {before_id: beforeId});
    S.hasMore = data.has_more;
    if (!S.hasMore) {
      const btn = c.querySelector('.load-more-btn');
      if (btn) btn.remove();
    }
    if (data.messages.length) renderMessages(data.messages, true);
  } catch(e) { toast(e.message, true); }
  S.loadingMore = false;
}

function buildMsgEl(msg, consecutive, isGroup) {
  const isOut = msg.sender_id === S.me.id;
  const div = document.createElement('div');
  div.className = `msg-wrap ${isOut?'out':'in'} ${consecutive?'consecutive':'first'} `;
  div.dataset.id = msg.id;
  div.dataset.sender = msg.sender_id;

  const sender = msg.sender || {id:0, username:'Удалён', avatar_color:'#888', is_online:false};
  const avHTML = !isOut
    ? (consecutive
        ? `<div style="width:32px;flex-shrink:0"></div>`
        : `<div class="av av-32 msg-av" style="background:${sender.avatar_color}">${initials(sender.username)}</div>`)
    : '';

  const senderName = isGroup && !isOut && !consecutive
    ? `<div class="sndr" style="color:${sender.avatar_color}">${esc(sender.username)}</div>` : '';

  const tick = isOut
    ? `<span class="msg-tick ${msg.is_read?'read':''}">✓✓</span>` : '';

  div.innerHTML = `
    ${avHTML}
    <div class="bubble">
      ${senderName}
      <div class="txt">${esc(msg.content)}</div>
      <div class="meta">
        <span class="msg-time">${fmtTime(msg.created_at)}</span>
        ${tick}
      </div>
    </div>`;
  return div;
}

function appendMsg(msg) {
  const c = document.getElementById('messages');
  // Определяем последнего отправителя
  const last = c.querySelector('.msg-wrap[data-sender]:last-of-type');
  const lastSender = last ? parseInt(last.dataset.sender) : null;
  const consecutive = lastSender === msg.sender_id;

  // Дата-разделитель если нужен
  const dateStr = fmtDate(msg.created_at);
  const lastSep = c.querySelector('.date-sep:last-of-type');
  if (!lastSep || lastSep.querySelector('span').textContent !== dateStr) {
    const sep = document.createElement('div');
    sep.className = 'date-sep'; sep.innerHTML = `<span>${dateStr}</span>`;
    c.appendChild(sep);
  }

  const room = S.rooms.find(r => r.id === S.roomId);
  c.appendChild(buildMsgEl(msg, consecutive, room && room.is_group));
}

function scrollBottom(smooth=true) {
  const c = document.getElementById('messages');
  c.scrollTo({top: c.scrollHeight, behavior: smooth?'smooth':'instant'});
}

/* ════════════════════════════════════════════════
   ОТПРАВКА СООБЩЕНИЙ
════════════════════════════════════════════════ */
function sendMsg() {
  const ta = document.getElementById('msg-input');
  const text = ta.value.trim();
  if (!text || !S.roomId) return;
  if (text.length > 4096) { toast('Сообщение слишком длинное', true); return; }

  if (!S.ws || S.ws.readyState !== WebSocket.OPEN) {
    toast('⚠️ Нет соединения, переподключаемся...');
    connectWS(); return;
  }

  wsSend({type:'message', room_id: S.roomId, content: text});
  ta.value = ''; ta.style.height = 'auto';
  updateCharCnt(ta);
  sendTyping(false);
}

function onKeyDown(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function onInput(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  updateCharCnt(ta);
  handleTyping();
}

function updateCharCnt(ta) {
  const len = ta.value.length;
  const wrap = ta.closest('.input-wrap');
  let cnt = wrap.querySelector('.char-cnt');
  if (len > 3800) {
    if (!cnt) { cnt = document.createElement('span'); cnt.className='char-cnt'; wrap.appendChild(cnt); }
    cnt.textContent = 4096 - len;
    cnt.style.color = len > 4000 ? '#ff6b6b' : 'var(--text3)';
  } else if (cnt) cnt.remove();
}

function handleTyping() {
  if (!S.roomId) return;
  if (!S.wasTyping) { sendTyping(true); S.wasTyping = true; }
  clearTimeout(S.typingTO);
  S.typingTO = setTimeout(() => { sendTyping(false); S.wasTyping = false; }, 2500);
}

function sendTyping(on) {
  if (S.roomId) wsSend({type:'typing', room_id: S.roomId, is_typing: on});
}

/* ════════════════════════════════════════════════
   МОДАЛКА — НОВЫЙ ЧАТ
════════════════════════════════════════════════ */
let _newChatTab = 'direct';

async function openNewChat() {
  S.groupSel = new Set();
  document.getElementById('nc-search').value = '';
  document.getElementById('grp-name').value = '';
  document.getElementById('grp-search').value = '';
  switchNewChatTab('direct');
  openModal('modal-new');
  // Грузим пользователей
  try {
    S.allUsers = await http('GET', '/api/users', null, {search:''});
    renderNewChatUsers(S.allUsers);
    renderGroupUsers(S.allUsers);
  } catch(e) {
    document.getElementById('nc-users').innerHTML = `<div style="color:var(--text3)">${e.message}</div>`;
  }
}

function switchNewChatTab(t) {
  _newChatTab = t;
  document.getElementById('nc-direct').classList.toggle('hidden', t!=='direct');
  document.getElementById('nc-group').classList.toggle('hidden', t!=='group');
  document.querySelectorAll('.modal-tab').forEach((el,i) =>
    el.classList.toggle('on', (i===0&&t==='direct')||(i===1&&t==='group')));
}

function searchUsers(q) {
  const list = S.allUsers.filter(u => u.username.toLowerCase().includes(q.toLowerCase()));
  renderNewChatUsers(list);
}

function renderNewChatUsers(users) {
  const el = document.getElementById('nc-users');
  if (!users.length) { el.innerHTML='<div style="color:var(--text3);text-align:center;padding:16px">Не найдено</div>'; return; }
  el.innerHTML = users.map(u => `
    <div class="user-row" onclick="openDirect(${u.id})">
      ${avEl(u, 'av-32')}
      <div class="user-row-info">
        <div class="user-row-name">${esc(u.username)}</div>
        <div class="user-row-status ${u.is_online?'online':''}">${u.is_online?'онлайн':'оффлайн'}</div>
      </div>
    </div>`).join('');
}

async function openDirect(userId) {
  closeModal('modal-new');
  try {
    const room = await http('POST', '/api/rooms/direct', {user_id: userId});
    if (!S.rooms.find(r => r.id === room.id)) S.rooms.unshift(room);
    renderRooms();
    openRoom(room.id);
  } catch(e) { toast(e.message, true); }
}

// ── Группа ──────────────────────────────────────────────────

function searchGroupUsers(q) {
  const list = S.allUsers.filter(u => u.username.toLowerCase().includes(q.toLowerCase()));
  renderGroupUsers(list);
}

function renderGroupUsers(users) {
  const el = document.getElementById('grp-users');
  if (!users.length) { el.innerHTML='<div style="color:var(--text3);text-align:center;padding:16px">Не найдено</div>'; return; }
  el.innerHTML = users.map(u => {
    const sel = S.groupSel.has(u.id);
    return `<div class="user-row ${sel?'selected':''}" onclick="toggleGroupMember(${u.id})">
      ${avEl(u, 'av-32')}
      <div class="user-row-info">
        <div class="user-row-name">${esc(u.username)}</div>
        <div class="user-row-status ${u.is_online?'online':''}">${u.is_online?'онлайн':'оффлайн'}</div>
      </div>
      <div class="user-row-check">${sel?'✓':''}</div>
    </div>`;
  }).join('');
}

function toggleGroupMember(uid) {
  S.groupSel.has(uid) ? S.groupSel.delete(uid) : S.groupSel.add(uid);
  const cnt = S.groupSel.size;
  document.getElementById('sel-count').textContent = cnt
    ? `Выбрано: ${cnt} ${cnt===1?'участник':cnt<5?'участника':'участников'}` : '';
  renderGroupUsers(S.allUsers.filter(u => {
    const q = document.getElementById('grp-search').value.toLowerCase();
    return !q || u.username.toLowerCase().includes(q);
  }));
}

async function createGroup() {
  const name = document.getElementById('grp-name').value.trim();
  if (!name) { toast('Введите название группы', true); return; }
  if (S.groupSel.size === 0) { toast('Выберите хотя бы одного участника', true); return; }
  try {
    const room = await http('POST', '/api/rooms/group', {name, member_ids: [...S.groupSel]});
    closeModal('modal-new');
    S.rooms.unshift(room);
    renderRooms();
    openRoom(room.id);
  } catch(e) { toast(e.message, true); }
}

/* ════════════════════════════════════════════════
   УЧАСТНИКИ ГРУППЫ
════════════════════════════════════════════════ */
async function showMembers() {
  if (!S.roomId) return;
  openModal('modal-members');
  const el = document.getElementById('members-list');
  el.innerHTML = '<div class="spinner" style="padding:16px"></div>';
  try {
    const members = await http('GET', `/api/rooms/${S.roomId}/members`);
    el.innerHTML = members.map(m => `
      <div class="user-row">
        ${avEl(m, 'av-32')}
        <div class="user-row-info">
          <div class="user-row-name">${esc(m.username)} ${m.id===S.me.id?'<span style="color:var(--text3);font-size:11px">(вы)</span>':''}</div>
          <div class="user-row-status ${m.is_online?'online':''}">${m.is_online?'онлайн':'оффлайн'}</div>
        </div>
      </div>`).join('');
  } catch(e) { el.innerHTML = `<div style="color:var(--text3)">${e.message}</div>`; }
}

/* ════════════════════════════════════════════════
   МОДАЛКИ — ОБЩЕЕ
════════════════════════════════════════════════ */
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function closeIfOverlay(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('modal-new');
    closeModal('modal-members');
  }
});

/* ════════════════════════════════════════════════
   ЗВУК
════════════════════════════════════════════════ */
function playBeep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime+.1);
    g.gain.setValueAtTime(.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime+.25);
    osc.start(); osc.stop(ctx.currentTime+.25);
  } catch {}
}
