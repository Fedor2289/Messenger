<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexusChat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#22c55e;--green2:#16a34a;--green3:#bbf7d0;--green4:#dcfce7;
  --bg:#f0fdf4;--sidebar:#ffffff;--msg-bg:#ffffff;--msg-own:#dcfce7;
  --text:#111827;--text2:#6b7280;--border:#e5e7eb;--shadow:0 1px 3px rgba(0,0,0,.1);
}
body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px}

/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:320px;min-width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Auth */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.auth-card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(34,197,94,.15);border:1px solid var(--green3)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo h1{font-size:28px;font-weight:700;color:var(--green2)}.auth-logo p{color:var(--text2);font-size:14px;margin-top:4px}
.auth-tabs{display:flex;background:#f9fafb;border-radius:10px;padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;text-align:center;border:none;background:transparent;border-radius:8px;font-size:14px;font-weight:500;color:var(--text2);transition:.2s}
.auth-tab.active{background:#fff;color:var(--green2);box-shadow:var(--shadow)}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.inp{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:14px;transition:.2s;background:#fff}
.inp:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.btn{padding:10px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;transition:.2s;cursor:pointer}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green2)}
.btn-full{width:100%;padding:12px}
.btn-ghost{background:transparent;color:var(--text2)}.btn-ghost:hover{background:#f9fafb;color:var(--text)}
.btn-danger{background:#fee2e2;color:#dc2626}.btn-danger:hover{background:#fecaca}
.btn-sm{padding:6px 12px;font-size:12px}
.err{color:#dc2626;font-size:13px;margin-top:8px;padding:8px 12px;background:#fee2e2;border-radius:8px}

/* Sidebar header */
.s-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-header h2{font-size:18px;font-weight:700;color:var(--green2);flex:1}
.icon-btn{width:34px;height:34px;border-radius:8px;border:none;background:var(--green4);color:var(--green2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.icon-btn:hover{background:var(--green3)}

/* Search */
.s-search{padding:12px 16px;border-bottom:1px solid var(--border)}
.s-search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;background:#f9fafb}
.s-search input:focus{background:#fff;border-color:var(--green)}

/* Chat list */
.chat-list{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f9fafb;transition:.15s}
.chat-item:hover{background:#f9fafb}
.chat-item.active{background:var(--green4)}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--green3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:var(--green2);flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.sm{width:32px;height:32px;font-size:13px}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.chat-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.badge{font-size:10px;padding:2px 6px;border-radius:20px;font-weight:600}
.badge-green{background:var(--green4);color:var(--green2)}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-purple{background:#ede9fe;color:#6d28d9}

/* User menu */
.s-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.s-footer .name{font-size:13px;font-weight:600;flex:1}
.s-footer .role{font-size:11px;color:var(--green2)}

/* Main area */
.m-header{padding:14px 20px;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;gap:12px}
.m-header .info h3{font-size:15px;font-weight:600}
.m-header .info p{font-size:12px;color:var(--text2)}
.m-header .actions{margin-left:auto;display:flex;gap:6px}

/* Messages */
.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
.msg-group{display:flex;gap:8px;align-items:flex-end}
.msg-group.own{flex-direction:row-reverse}
.msg-bubble{max-width:65%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word;box-shadow:var(--shadow)}
.msg-bubble.other{background:#fff;border-bottom-left-radius:4px}
.msg-bubble.own{background:var(--msg-own);border-bottom-right-radius:4px}
.msg-bubble.bot{background:#ede9fe;border-bottom-left-radius:4px}
.msg-sender{font-size:11px;font-weight:600;color:var(--green2);margin-bottom:4px}
.msg-sender.bot-name{color:#6d28d9}
.msg-time{font-size:10px;color:var(--text2);margin-top:4px;text-align:right}
.msg-reply{font-size:11px;background:rgba(0,0,0,.06);border-left:2px solid var(--green);padding:4px 8px;border-radius:4px;margin-bottom:6px;color:var(--text2)}

/* Input area */
.input-area{padding:16px 20px;background:#fff;border-top:1px solid var(--border)}
.reply-preview{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--green4);border-radius:8px;margin-bottom:8px;font-size:12px}
.input-row{display:flex;align-items:flex-end;gap:8px;background:#f9fafb;border:1px solid var(--border);border-radius:14px;padding:6px 6px 6px 14px}
.input-row:focus-within{border-color:var(--green);background:#fff}
.msg-input{flex:1;border:none;background:transparent;font-size:14px;resize:none;max-height:120px;line-height:1.5;padding:6px 0}
.send-btn{width:38px;height:38px;border-radius:10px;border:none;background:var(--green);color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{background:var(--green2)}

/* File upload */
.file-btn{width:34px;height:34px;border-radius:8px;border:none;background:transparent;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center}
.file-btn:hover{background:var(--green4);color:var(--green2)}
.file-msg{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(0,0,0,.05);border-radius:8px;font-size:13px;text-decoration:none;color:inherit}
.file-msg:hover{background:rgba(0,0,0,.1)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--text2);text-align:center;padding:40px;gap:12px}
.empty-state .icon{font-size:64px;opacity:.4}
.empty-state h3{font-size:18px;font-weight:600;color:var(--text)}
.empty-state p{font-size:14px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.2)}
.modal h2{font-size:18px;font-weight:700;margin-bottom:20px;color:var(--text)}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Tabs in modals */
.tab-row{display:flex;gap:4px;margin-bottom:16px;background:#f9fafb;padding:4px;border-radius:10px}
.tab-btn{flex:1;padding:7px;text-align:center;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:.15s}
.tab-btn.active{background:#fff;color:var(--green2);box-shadow:var(--shadow)}

/* Members list */
.member-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f9fafb}
.member-item:last-child{border:none}
.user-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:.15s}
.user-item:hover{background:#f9fafb}
.user-item.selected{background:var(--green4)}
.checkmark{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);margin-left:auto;display:flex;align-items:center;justify-content:center;font-size:11px}
.user-item.selected .checkmark{background:var(--green);border-color:var(--green);color:#fff}

/* Admin panel */
.admin-wrap{flex:1;overflow-y:auto;padding:24px}
.admin-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border);text-align:center}
.stat-card .num{font-size:32px;font-weight:700;color:var(--green2)}
.stat-card .lbl{font-size:12px;color:var(--text2);margin-top:4px}
.admin-section h3{font-size:15px;font-weight:700;margin-bottom:12px}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:8px 12px;background:#f9fafb;color:var(--text2);font-weight:600;border-bottom:1px solid var(--border)}
.admin-table td{padding:8px 12px;border-bottom:1px solid #f9fafb;vertical-align:middle}
.admin-table tr:hover td{background:#f9fafb}

/* Bot cards */
.bot-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;gap:12px;align-items:flex-start}
.bot-avatar{width:44px;height:44px;border-radius:12px;background:#ede9fe;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.bot-info{flex:1;min-width:0}
.bot-name{font-weight:600;font-size:14px}
.bot-desc{font-size:12px;color:var(--text2);margin-top:2px}
.bot-meta{font-size:11px;color:var(--text2);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:8px 12px;background:#fff;border-radius:16px;width:fit-content;box-shadow:var(--shadow)}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--green3);animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* Sidebar nav */
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:.15s;border-radius:8px;margin:1px 8px}
.nav-item:hover{background:var(--green4);color:var(--green2)}
.nav-item.active{background:var(--green4);color:var(--green2)}

/* Mobile */
@media(max-width:640px){
  .sidebar{width:100%;position:absolute;z-index:10;height:100%;transform:translateX(-100%);transition:.3s}
  .sidebar.open{transform:none}
  .main{width:100%}
  .msg-bubble{max-width:85%}
  .admin-stats{grid-template-columns:1fr 1fr}
}

/* Tooltip */
.tooltip-container{position:relative}
.tooltip{position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:.15s}
.tooltip-container:hover .tooltip{opacity:1}

.divider{text-align:center;font-size:11px;color:var(--text2);margin:8px 0;position:relative}
.divider:before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);z-index:0}
.divider span{background:var(--bg);padding:0 8px;position:relative;z-index:1}
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo} = React;

// ─── API ──────────────────────────────────────────────────────────────────────
const api = {
  token: localStorage.getItem('nx_token'),
  setToken(t){this.token=t; localStorage.setItem('nx_token',t)},
  clearToken(){this.token=null; localStorage.removeItem('nx_token')},
  async req(method,path,body,isForm){
    const headers = {};
    if(this.token) headers.Authorization = `Bearer ${this.token}`;
    if(!isForm) headers['Content-Type']='application/json';
    const r = await fetch(`/api${path}`,{method,headers,body:isForm?body:body?JSON.stringify(body):undefined});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error||`HTTP ${r.status}`)}
    return r.json();
  },
  get(p){return this.req('GET',p)},
  post(p,b){return this.req('POST',p,b)},
  put(p,b){return this.req('PUT',p,b)},
  del(p){return this.req('DELETE',p)},
  upload(p,fd){return this.req('POST',p,fd,true)},
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const initials = s => s ? s.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2) : '?';
const timeAgo = d => {
  if(!d) return '';
  const dt = new Date(d), now = new Date(), diff = now-dt;
  if(diff<60000) return 'только что';
  if(diff<3600000) return `${Math.floor(diff/60000)} мин`;
  if(diff<86400000) return dt.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return dt.toLocaleDateString('ru',{day:'2-digit',month:'2-digit'});
};
const chatTypeLabel = t => ({private:'Личный',group:'Группа',channel:'Канал'}[t]||t);
const chatTypeIcon = t => ({private:'💬',group:'👥',channel:'📢'}[t]||'💬');

// ─── WebSocket Hook ───────────────────────────────────────────────────────────
function useWS(token, onMessage) {
  const ws = useRef(null);
  const cb = useRef(onMessage);
  cb.current = onMessage;
  useEffect(()=>{
    if(!token) return;
    const proto = location.protocol==='https:'?'wss':'ws';
    const connect = () => {
      ws.current = new WebSocket(`${proto}://${location.host}?token=${token}`);
      ws.current.onmessage = e => { try{cb.current(JSON.parse(e.data))}catch{} };
      ws.current.onclose = () => setTimeout(connect, 3000);
    };
    connect();
    return ()=>{ ws.current?.close(); };
  },[token]);
  const send = useCallback(data => {
    if(ws.current?.readyState===1) ws.current.send(JSON.stringify(data));
  },[]);
  return send;
}

// ─── Avatar ───────────────────────────────────────────────────────────────────
function Avatar({name,src,size='md',color}){
  const sz = size==='sm'?'sm':'';
  const colors = ['#bbf7d0','#bfdbfe','#ede9fe','#fee2e2','#fef9c3','#d1fae5'];
  const bg = color||colors[(name||'?').charCodeAt(0)%colors.length];
  return <div className={`avatar ${sz}`} style={{background:bg}}>
    {src?<img src={src} alt={name}/>:initials(name)}
  </div>;
}

// ─── Auth Screen ──────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const [tab,setTab]=useState('login');
  const [form,setForm]=useState({login:'',email:'',username:'',password:''});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const set = k => e => setForm(f=>({...f,[k]:e.target.value}));
  const submit = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try{
      let r;
      if(tab==='login') r = await api.post('/auth/login',{login:form.login,password:form.password});
      else r = await api.post('/auth/register',{username:form.username,email:form.email,password:form.password});
      api.setToken(r.token); onAuth(r.user,r.token);
    } catch(e){ setErr(e.message); }
    setLoading(false);
  };
  return <div className="auth-wrap">
    <div className="auth-card fade-in">
      <div className="auth-logo">
        <h1>🔥 NexusChat</h1>
        <p>Мессенджер с ИИ-ботами</p>
      </div>
      <div className="auth-tabs">
        <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>setTab('login')}>Войти</button>
        <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={()=>setTab('register')}>Регистрация</button>
      </div>
      <form onSubmit={submit}>
        {tab==='register'&&<>
          <div className="input-group"><label>Имя пользователя</label><input className="inp" placeholder="username" value={form.username} onChange={set('username')} required/></div>
          <div className="input-group"><label>Email</label><input className="inp" type="email" placeholder="you@example.com" value={form.email} onChange={set('email')} required/></div>
        </>}
        {tab==='login'&&<div className="input-group"><label>Логин или Email</label><input className="inp" placeholder="username или email" value={form.login} onChange={set('login')} required/></div>}
        <div className="input-group"><label>Пароль</label><input className="inp" type="password" placeholder="••••••" value={form.password} onChange={set('password')} required/></div>
        {err&&<div className="err">⚠️ {err}</div>}
        <button className="btn btn-primary btn-full" style={{marginTop:16}} disabled={loading}>
          {loading?'Загрузка...':(tab==='login'?'Войти':'Зарегистрироваться')}
        </button>
      </form>
    </div>
  </div>;
}

// ─── Create Chat Modal ────────────────────────────────────────────────────────
function CreateChatModal({onClose,onCreate}){
  const [tab,setTab]=useState('new');
  const [type,setType]=useState('group');
  const [name,setName]=useState('');
  const [desc,setDesc]=useState('');
  const [search,setSearch]=useState('');
  const [users,setUsers]=useState([]);
  const [selected,setSelected]=useState([]);
  const [loading,setLoading]=useState(false);
  useEffect(()=>{
    if(search.length<2){setUsers([]);return;}
    api.get(`/users/search?q=${search}`).then(setUsers).catch(()=>{});
  },[search]);
  const toggle = u => setSelected(s=>s.find(x=>x.id===u.id)?s.filter(x=>x.id!==u.id):[...s,u]);
  const submit = async () => {
    if(!name&&type!=='private') return;
    setLoading(true);
    try{
      const chat = await api.post('/chats',{name,type,description:desc,member_ids:selected.map(u=>u.id)});
      onCreate(chat); onClose();
    } catch(e){alert(e.message);}
    setLoading(false);
  };
  const startPrivate = async u => {
    setLoading(true);
    try{
      const chat = await api.post('/chats/private',{user_id:u.id});
      onCreate(chat); onClose();
    }catch(e){alert(e.message);}
    setLoading(false);
  };
  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal fade-in">
      <h2>Новый чат</h2>
      <div className="tab-row">
        <button className={`tab-btn ${tab==='new'?'active':''}`} onClick={()=>setTab('new')}>Группа/Канал</button>
        <button className={`tab-btn ${tab==='private'?'active':''}`} onClick={()=>setTab('private')}>Личный</button>
      </div>
      {tab==='private'?<>
        <input className="inp" placeholder="Поиск пользователя..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <div style={{marginTop:8}}>
          {users.map(u=><div key={u.id} className="user-item" onClick={()=>startPrivate(u)} style={{padding:'10px 8px'}}>
            <Avatar name={u.username} size="sm"/><span style={{fontSize:14,fontWeight:500}}>{u.username}</span>
          </div>)}
          {search.length>=2&&!users.length&&<div style={{textAlign:'center',color:'var(--text2)',fontSize:13,padding:16}}>Не найдено</div>}
        </div>
      </>:<>
        <div className="input-group"><label>Тип</label>
          <select className="inp" value={type} onChange={e=>setType(e.target.value)}>
            <option value="group">👥 Группа</option>
            <option value="channel">📢 Канал</option>
          </select>
        </div>
        <div className="input-group"><label>Название *</label><input className="inp" placeholder="Название чата" value={name} onChange={e=>setName(e.target.value)}/></div>
        <div className="input-group"><label>Описание</label><input className="inp" placeholder="Описание (необязательно)" value={desc} onChange={e=>setDesc(e.target.value)}/></div>
        <div className="input-group"><label>Добавить участников</label>

// ─── Chat Info Modal ──────────────────────────────────────────────────────────
function ChatInfoModal({chat,currentUser,onClose}){
  const [tab,setTab]=useState('members');
  const [members,setMembers]=useState([]);
  const [bots,setBots]=useState([]);
  const [allBots,setAllBots]=useState([]);
  const [search,setSearch]=useState('');
  const [users,setUsers]=useState([]);

  useEffect(()=>{
    api.get(`/chats/${chat.id}/members`).then(setMembers).catch(()=>{});
    api.get(`/chats/${chat.id}/bots`).then(setBots).catch(()=>{});
    api.get('/bots').then(setAllBots).catch(()=>{});
  },[chat.id]);

  useEffect(()=>{
    if(search.length<2){setUsers([]);return;}
    api.get(`/users/search?q=${search}`).then(setUsers).catch(()=>{});
  },[search]);

  const addMember = async u => {
    await api.post(`/chats/${chat.id}/members`,{user_id:u.id});
    setMembers(m=>[...m,{...u,role:'member'}]);
  };
  const removeMember = async u => {
    await api.del(`/chats/${chat.id}/members/${u.id}`);
    setMembers(m=>m.filter(x=>x.id!==u.id));
  };
  const addBot = async bot => {
    await api.post(`/bots/${bot.id}/add-to-chat`,{chat_id:chat.id});
    setBots(b=>[...b,bot]);
  };
  const removeBot = async bot => {
    await api.del(`/bots/${bot.id}/remove-from-chat`).then(()=>api.req('DELETE',`/bots/${bot.id}/remove-from-chat`)).catch(()=>{});
    await fetch(`/api/bots/${bot.id}/remove-from-chat`,{method:'DELETE',headers:{'Authorization':`Bearer ${api.token}`,'Content-Type':'application/json'},body:JSON.stringify({chat_id:chat.id})});
    setBots(b=>b.filter(x=>x.id!==bot.id));
  };

  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal fade-in">
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <Avatar name={chat.name||'?'} size="md"/>
        <div><div style={{fontWeight:700,fontSize:16}}>{chat.name||'Личный чат'}</div>
        <div style={{fontSize:12,color:'var(--text2)'}}>{chatTypeLabel(chat.type)} · {members.length} участников</div></div>
      </div>
      <div className="tab-row">
        <button className={`tab-btn ${tab==='members'?'active':''}`} onClick={()=>setTab('members')}>Участники</button>
        <button className={`tab-btn ${tab==='bots'?'active':''}`} onClick={()=>setTab('bots')}>ИИ-боты</button>
        {chat.type!=='private'&&<button className={`tab-btn ${tab==='add'?'active':''}`} onClick={()=>setTab('add')}>Добавить</button>}
      </div>
      {tab==='members'&&<div>
        {members.map(m=><div key={m.id} className="member-item">
          <Avatar name={m.username} size="sm"/>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{m.username}</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>{m.role}</div></div>
          {m.id!==currentUser.id&&<button className="btn btn-danger btn-sm" onClick={()=>removeMember(m)}>Удалить</button>}
        </div>)}
      </div>}
      {tab==='bots'&&<div>
        {bots.length===0&&<div style={{color:'var(--text2)',fontSize:13,padding:'12px 0'}}>Ботов нет. Добавьте бота!</div>}
        {bots.map(b=><div key={b.id} className="member-item">
          <div className="bot-avatar" style={{width:32,height:32,borderRadius:8,fontSize:16}}>🤖</div>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{b.name}</div>
          <div style={{fontSize:11,color:'var(--text2)'}}>@{b.username}</div></div>
          <button className="btn btn-danger btn-sm" onClick={()=>removeBot(b)}>Убрать</button>
        </div>)}
        <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
          <div style={{fontSize:12,color:'var(--text2)',marginBottom:8}}>Доступные боты:</div>
          {allBots.filter(b=>!bots.find(x=>x.id===b.id)).map(b=><div key={b.id} className="member-item">
            <div className="bot-avatar" style={{width:32,height:32,borderRadius:8,fontSize:16}}>🤖</div>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{b.name}</div></div>
            <button className="btn btn-primary btn-sm" onClick={()=>addBot(b)}>+ Добавить</button>
          </div>)}
          {allBots.filter(b=>!bots.find(x=>x.id===b.id)).length===0&&<div style={{fontSize:12,color:'var(--text2)'}}>Все боты уже добавлены</div>}
        </div>
      </div>}
      {tab==='add'&&<div>
        <input className="inp" placeholder="Поиск пользователя..." value={search} onChange={e=>setSearch(e.target.value)} style={{marginBottom:8}}/>

      <div className="modal-footer"><button className="btn btn-ghost" onClick={onClose}>Закрыть</button></div>
    </div>
  </div>;
}

// ─── Message Component ────────────────────────────────────────────────────────
function Message({msg,isOwn,showAvatar}){
  const isFile = msg.type==='file';
  const isBot = msg.type==='bot';
  const isImg = isFile && /\.(jpg|jpeg|png|gif|webp)$/i.test(msg.file_name||'');
  const cls = isOwn?'own':isBot?'bot':'other';
  return <div className={`msg-group ${isOwn?'own':''} fade-in`}>
    {!isOwn&&showAvatar?<Avatar name={msg.username} size="sm"/>:<div style={{width:32,flexShrink:0}}/>}
    <div style={{maxWidth:'65%'}}>
      {!isOwn&&showAvatar&&<div className={`msg-sender ${isBot?'bot-name':''}`}>{msg.username}</div>}
      {msg.reply_to&&<div className="msg-reply">↩️ {msg.reply_username}: {msg.reply_content?.slice(0,60)}</div>}
      <div className={`msg-bubble ${cls}`}>
        {isFile&&isImg?<img src={msg.file_url} alt={msg.file_name} style={{maxWidth:200,maxHeight:200,borderRadius:8,display:'block'}}/>:
         isFile?<a href={msg.file_url} target="_blank" className="file-msg" download>📎 {msg.file_name}</a>:
         <span style={{whiteSpace:'pre-wrap'}}>{msg.content}</span>}
        <div className="msg-time">{timeAgo(msg.created_at)}</div>
      </div>
    </div>
  </div>;
}

// ─── Chat Window ──────────────────────────────────────────────────────────────
function ChatWindow({chat,currentUser,wsSend}){
  const [messages,setMessages]=useState([]);
  const [text,setText]=useState('');
  const [replyTo,setReplyTo]=useState(null);
  const [typing,setTyping]=useState([]);
  const [showInfo,setShowInfo]=useState(false);
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  const fileRef=useRef(null);
  const typingTimer=useRef(null);
  const prevChat=useRef(null);

  useEffect(()=>{
    if(!chat) return;
    setMessages([]); setLoading(true); setReplyTo(null);
    api.get(`/chats/${chat.id}/messages?limit=50`).then(m=>{setMessages(m);setLoading(false);}).catch(()=>setLoading(false));
    prevChat.current=chat.id;
  },[chat?.id]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[messages]);

  // WS events from parent
  useEffect(()=>{
    if(!chat) return;
    const handler = e => {
      const data = JSON.parse(e.data||'{}');
      if(data.type==='message'&&data.data.chat_id===chat.id){
        setMessages(m=>[...m,data.data]);
      }
      if(data.type==='typing'&&data.data.chat_id===chat.id){
        setTyping(t=>{
          const filtered=t.filter(x=>x.user_id!==data.data.user_id);
          return [...filtered,data.data];
        });
        setTimeout(()=>setTyping(t=>t.filter(x=>x.user_id!==data.data.user_id)),2000);
      }
    };
    window.addEventListener('nx_ws',handler);
    return ()=>window.removeEventListener('nx_ws',handler);
  },[chat?.id]);

  const sendMsg = async () => {
    if(!text.trim()) return;
    const content = text.trim();
    setText('');
    try{
      await api.post('/messages',{chat_id:chat.id,content,reply_to:replyTo?.id});
      setReplyTo(null);
    } catch(e){alert(e.message);}
  };

  const sendFile = async e => {
    const file = e.target.files?.[0];
    if(!file) return;
    const fd = new FormData();
    fd.append('file',file);
    fd.append('chat_id',chat.id);
    if(replyTo) fd.append('reply_to',replyTo.id);
    try{
      await api.upload('/messages/file',fd);
      setReplyTo(null);
    }catch(e){alert(e.message);}
    e.target.value='';
  };

  const onKey = e => {
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
    clearTimeout(typingTimer.current);
    wsSend({type:'typing',chat_id:chat.id,username:currentUser.username});
    typingTimer.current=setTimeout(()=>{},2000);
  };

  if(!chat) return <div className="empty-state"><div className="icon">💬</div><h3>NexusChat</h3><p>Выберите чат слева или создайте новый</p></div>;

  const chatName = chat.type==='private'?`Личный чат`:chat.name;
  const typingOthers = typing.filter(t=>t.user_id!==currentUser.id);

  return <>
    <div className="m-header">
      <Avatar name={chatName}/>
      <div className="info">
        <h3>{chatName}</h3>
        <p>{chatTypeLabel(chat.type)} · {chat.member_count||0} участников</p>
      </div>
      <div className="actions">
        <button className="icon-btn" title="Информация о чате" onClick={()=>setShowInfo(true)}>ℹ️</button>
      </div>
    </div>
    <div className="messages-area">
      {loading&&<div style={{textAlign:'center',color:'var(--text2)',fontSize:13}}>Загрузка...</div>}
      {messages.map((m,i)=>{
        const isOwn=m.user_id===currentUser.id;
        const showAvatar=!isOwn&&(i===0||messages[i-1]?.user_id!==m.user_id);
        const showDate=i===0||new Date(messages[i-1]?.created_at).toDateString()!==new Date(m.created_at).toDateString();
        return <React.Fragment key={m.id}>
          {showDate&&<div className="divider"><span>{new Date(m.created_at).toLocaleDateString('ru',{day:'numeric',month:'long'})}</span></div>}
          <div onDoubleClick={()=>setReplyTo(m)}>
            <Message msg={m} isOwn={isOwn} showAvatar={showAvatar}/>
          </div>
        </React.Fragment>;
      })}
      {typingOthers.length>0&&<div className="msg-group fade-in">
        <div style={{width:32}}/>
        <div><div className="msg-sender">{typingOthers[0].username}</div>
        <div className="typing"><span/><span/><span/></div></div>
      </div>}
      <div ref={bottomRef}/>
    </div>
    <div className="input-area">
      {replyTo&&<div className="reply-preview">
        <span>↩️ Ответ для {replyTo.username}: {replyTo.content?.slice(0,50)}</span>
        <button className="btn btn-ghost btn-sm" style={{padding:'2px 8px'}} onClick={()=>setReplyTo(null)}>✕</button>
      </div>}
      <div className="input-row">
        <input type="file" ref={fileRef} style={{display:'none'}} onChange={sendFile}/>
        <button className="file-btn" title="Прикрепить файл" onClick={()=>fileRef.current.click()}>📎</button>
        <textarea className="msg-input" placeholder="Написать сообщение..." value={text} onChange={e=>setText(e.target.value)} onKeyDown={onKey} rows={1}/>
        <button className="send-btn" onClick={sendMsg}>➤</button>
      </div>
      <div style={{fontSize:11,color:'var(--text2)',marginTop:6,textAlign:'center'}}>Двойной клик по сообщению — ответить · Enter — отправить</div>
    </div>
    {showInfo&&<ChatInfoModal chat={chat} currentUser={currentUser} onClose={()=>setShowInfo(false)}/>}
  </>;
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [token,setToken]=useState(localStorage.getItem('nx_token'));
  const [chats,setChats]=useState([]);
  const [activeChat,setActiveChat]=useState(null);
  const [view,setView]=useState('chats'); // chats | bots | admin
  const [showCreate,setShowCreate]=useState(false);
  const [chatSearch,setChatSearch]=useState('');
  const [sidebarOpen,setSidebarOpen]=useState(false);

  // Handle incoming WS messages
  const wsSend = useWS(token, useCallback(msg=>{
    window.dispatchEvent(new MessageEvent('nx_ws',{data:JSON.stringify(msg)}));
    if(msg.type==='message'){
      setChats(cs=>cs.map(c=>c.id===msg.data.chat_id?{...c,last_message:msg.data.content,last_message_at:msg.data.created_at}:c).sort((a,b)=>new Date(b.last_message_at||0)-new Date(a.last_message_at||0)));
    }
  },[]));

  useEffect(()=>{
    if(!token) return;
    api.get('/auth/me').then(u=>{setUser(u);loadChats();}).catch(()=>{api.clearToken();setToken(null);});
  },[token]);

  const loadChats = () => api.get('/chats').then(setChats).catch(()=>{});

  const handleAuth = (u,t) => { setUser(u); setToken(t); };
  const logout = () => { api.clearToken(); setToken(null); setUser(null); setChats([]); setActiveChat(null); };

  const filteredChats = useMemo(()=>chats.filter(c=>{
    const name=(c.name||'Личный чат').toLowerCase();
    return name.includes(chatSearch.toLowerCase());
  }),[chats,chatSearch]);

  if(!token||!user) return <AuthScreen onAuth={handleAuth}/>;

  const selectChat = c => { setActiveChat(c); setView('chats'); setSidebarOpen(false); };

  return <div className="app">
    {/* Sidebar */}
    <div className={`sidebar ${sidebarOpen?'open':''}`}>
      <div className="s-header">
        <span style={{fontSize:20}}>🔥</span>
        <h2>NexusChat</h2>
        <button className="icon-btn" title="Новый чат" onClick={()=>setShowCreate(true)}>✏️</button>
      </div>

      {/* Nav */}
      <div style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
        <div className={`nav-item ${view==='chats'?'active':''}`} onClick={()=>setView('chats')}>💬 Чаты</div>
        <div className={`nav-item ${view==='bots'?'active':''}`} onClick={()=>setView('bots')}>🤖 ИИ-Боты</div>
        {user.is_admin&&<div className={`nav-item ${view==='admin'?'active':''}`} onClick={()=>setView('admin')}>⚙️ Админка</div>}
      </div>

      {view==='chats'&&<>
        <div className="s-search">
          <input placeholder="Поиск чатов..." value={chatSearch} onChange={e=>setChatSearch(e.target.value)}/>
        </div>
        <div className="chat-list">
          {filteredChats.length===0&&<div style={{padding:24,textAlign:'center',color:'var(--text2)',fontSize:13}}>
            {chatSearch?'Не найдено':'Нет чатов. Создайте первый! ✏️'}
          </div>}
          {filteredChats.map(c=>{
            const name=c.type==='private'?'Личный чат':c.name;
            return <div key={c.id} className={`chat-item ${activeChat?.id===c.id?'active':''}`} onClick={()=>selectChat(c)}>
              <Avatar name={name}/>
              <div className="chat-info">
                <div className="chat-name">
                  {chatTypeIcon(c.type)} {name}
                  {c.type!=='private'&&<span className="badge badge-green" style={{fontSize:9}}>{chatTypeLabel(c.type)}</span>}
                </div>
                <div className="chat-preview">{c.last_message||'Нет сообщений'}</div>
              </div>
              <div style={{fontSize:10,color:'var(--text2)',flexShrink:0}}>{timeAgo(c.last_message_at)}</div>
            </div>;
          })}
        </div>
      </>}

      {/* Footer */}
      <div className="s-footer">
        <Avatar name={user.username} size="sm"/>
        <div style={{flex:1,minWidth:0}}>
          <div className="name">{user.username}</div>
          <div className="role">{user.is_admin?'👑 Администратор':'Пользователь'}</div>
        </div>
        <button className="icon-btn" title="Выйти" onClick={logout}>🚪</button>
      </div>
    </div>

    {/* Main */}
    <div className="main">
      {view==='chats'&&<>
        {/* Mobile header */}
        <div style={{display:'none',padding:'12px 16px',borderBottom:'1px solid var(--border)',background:'#fff',alignItems:'center',gap:10}} className="mobile-bar">
          <button className="icon-btn" onClick={()=>setSidebarOpen(s=>!s)}>☰</button>
          <span style={{fontWeight:700,color:'var(--green2)'}}>🔥 NexusChat</span>
        </div>
        <ChatWindow chat={activeChat} currentUser={user} wsSend={wsSend}/>
      </>}
      {view==='bots'&&<BotsManager/>}
      {view==='admin'&&user.is_admin&&<AdminPanel/>}
    </div>

    {showCreate&&<CreateChatModal onClose={()=>setShowCreate(false)} onCreate={c=>{setChats(cs=>[c,...cs]);setActiveChat(c);setView('chats');}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<style>
@media(max-width:640px){
  .sidebar{position:absolute!important}
  .mobile-bar{display:flex!important}
}
</style>
</body>
</html>
